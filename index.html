                                                    <div className="font-bold text-slate-900 font-sans">{preparedBy}</div>
                                                    <div className="text-slate-555">{preparerTitle}, Kolthoff Consulting</div>
                                                    <div className="text-slate-400">Date: {quoteDate}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
