<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolthoff Consulting - Internal Pricing Engine</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: {
                            950: '#020613',
                            900: '#09111F',
                            850: '#0C1626',
                            800: '#0F1A2C',
                            750: '#15233A',
                            700: '#1B2C46',
                            600: '#2E4567',
                        },
                        brandBlue: {
                            50: '#F0F6FF',
                            100: '#E0EDFF',
                            200: '#C2DBFF',
                            300: '#99C4FF',
                            400: '#60A1FA',
                            500: '#2563EB',
                            600: '#1D4ED8',
                            700: '#1E40AF',
                            850: '#0F2963',
                            950: '#0B1731',
                        }
                    },
                    fontFamily: {
                        sans: ['"Montserrat"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020613; }
        ::-webkit-scrollbar-thumb { background: #0F1A2C; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563EB; }
        .luxury-gradient { background: radial-gradient(circle at 50% -20%, #0F1A2C 0%, #020613 100%); }

        @media print {
            body, #root, #root > div, .animate-fade-in, .print-card {
                background: white !important;
                color: #0f172a !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                width: 100% !important;
            }
            .no-print { display: none !important; }
            @page { size: portrait; margin: 18mm 15mm; }
        }
    </style>
</head>
<body class="luxury-gradient text-slate-100 antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- HOISTED UTILITIES ---
        function formatCurrency(val) {
            return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val);
        }
        function loadSavedData(key, fallback) {
            try {
                const saved = localStorage.getItem(key);
                return saved ? JSON.parse(saved) : fallback;
            } catch (e) { return fallback; }
        }
        function getTodayDateString() {
            return new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        // --- ICON COMPONENTS ---
        const IconWebsiteLogo = ({ className = "w-10 h-10" }) => (
            <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10 C70 14 86 20 86 20 V54 C86 74 71 87 50 92 C29 87 14 74 14 54 V20 C14 20 30 14 50 10 Z" fill="currentColor" fillOpacity="0.12" stroke="currentColor" strokeWidth="4.5"/>
                <circle cx="50" cy="52" r="22" fill="none" stroke="currentColor" strokeWidth="4.5" />
                <path d="M38 52 L47 61 L64 39" stroke="#2563EB" strokeWidth="7" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
        );

        const IconCheckSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 11 3 3 7-7"/><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-600"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;

        const INITIAL_TASKS = [
            { id: 'diag-1', category: 'MOD 0 - Diagnostics', deliverable: 'Preparation & Onboarding', description: 'Client kickoff, data security brief, and initial corporate baseline data acquisition.', estHours: 4, tier: 'associate', selected: true },
            { id: 'diag-2', category: 'MOD 0 - Diagnostics', deliverable: 'Stakeholder Discovery', description: 'Discovery loop (structured interviews with 4-6 key leadership roles and desk operators).', estHours: 8, tier: 'associate', selected: true },
            { id: 'diag-3', category: 'MOD 0 - Diagnostics', deliverable: 'On-Site Observation Audit', description: 'Two days of continuous on-site workflow shadowing and bottleneck mapping.', estHours: 16, tier: 'senior', selected: true },
            { id: 'diag-4', category: 'MOD 0 - Diagnostics', deliverable: 'DOLE & SaaS Rationalization', description: 'Audit of labor compliance and technology software stack/subscription under-utilization.', estHours: 8, tier: 'senior', selected: true },
            { id: 'diag-5', category: 'MOD 0 - Diagnostics', deliverable: 'Risk Matrix Formulation', description: 'Synthesis of raw research data into a highly prioritized B2B Operational Risk Matrix.', estHours: 6, tier: 'senior', selected: true },
            { id: 'diag-6', category: 'MOD 0 - Diagnostics', deliverable: 'Debrief & Roadmap Handover', description: 'Boardroom-ready presentation of audit discoveries and strategic scaling options.', estHours: 6, tier: 'principal', selected: true },
            { id: 'sop-vsm', category: 'MOD I - SOPs & RACI', deliverable: 'Macro Value Stream Mapping', description: 'Leading intensive VSM workshops with executive sponsors to map macro informational flows.', estHours: 16, tier: 'senior', selected: false },
            { id: 'sop-1', category: 'MOD I - SOPs & RACI', deliverable: 'Org Structure & RACI Mapping', description: 'Systematic mapping of operational reporting lines and functional accountability matrices.', estHours: 12, tier: 'senior', selected: false },
            { id: 'sop-2', category: 'MOD I - SOPs & RACI', deliverable: 'Swimlane & Cycle-Time Maps', description: 'Mapping cross-functional swimlane diagrams (up to 5 workflows) including cycle-time traces.', estHours: 48, tier: 'senior', selected: false },
            { id: 'sop-4', category: 'MOD I - SOPs & RACI', deliverable: 'DOLE-Aligned GLS Manual', description: 'Compilation of compliant behavioral regulations protecting against labor litigation.', estHours: 16, tier: 'senior', selected: false },
            { id: 'pmo-lark', category: 'MOD II - PMO & Automation', deliverable: 'Enterprise Lark Collaboration Hub', description: 'Migrating swimlanes into automated Lark collaboration structures and multi-tier approval flows.', estHours: 16, tier: 'senior', selected: false },
            { id: 'pmo-hermes', category: 'MOD II - PMO & Automation', deliverable: 'HERMES 2025 Framework Setup', description: 'Structured onboarding of Swiss-standard project delivery lifecycles and phase gating.', estHours: 12, tier: 'senior', selected: false },
            { id: 'pmo-change', category: 'MOD II - PMO & Automation', deliverable: 'Workforce Change Management', description: 'Manager enablement workshops and simulations to prevent legacy process relapse.', estHours: 12, tier: 'senior', selected: false },
            { id: 'coo-1', category: 'MOD III - COO & Retainers', deliverable: 'Operations Alignment Governance', description: 'Directing weekly leadership alignment loops, metrics tracking, and project accountability.', estHours: 8, tier: 'principal', selected: false, isMonthlyRetainer: true },
            { id: 'coo-drift', category: 'MOD III - COO & Retainers', deliverable: 'Semi-Annual Process Drift Audit', description: 'Bi-annual on-site audits to trace compliance leaks and prevent process entropy.', estHours: 8, tier: 'principal', selected: false, isMonthlyRetainer: true },
            { id: 'coo-msp', category: 'MOD III - COO & Retainers', deliverable: 'Cyber-Security Protection SLA', description: 'Endpoint threat detection and automated backups delivered by authorized strategic partner.', estHours: 10, tier: 'partner', selected: false, isMonthlyRetainer: true }
        ];

        function App() {
            const [view, setView] = useState('sandbox');
            const [copied, setCopied] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);

            // 1. CORE DATA STATE
            const [tasks, setTasks] = useState(() => loadSavedData('kc_planner_tasks', INITIAL_TASKS));
            const [principalRate, setPrincipalRate] = useState(() => loadSavedData('kc_planner_rates', { principal: 3500 }).principal);
            const [seniorRate, setSeniorRate] = useState(() => loadSavedData('kc_planner_rates', { senior: 2500 }).senior);
            const [associateRate, setAssociateRate] = useState(() => loadSavedData('kc_planner_rates', { associate: 1500 }).associate);
            const [partnerRate, setPartnerRate] = useState(() => loadSavedData('kc_planner_rates', { partner: 2000 }).partner);
            const [weeklyHours, setWeeklyHours] = useState(() => loadSavedData('kc_planner_weekly_hours', 16));

            // 2. METADATA STATE
            const [clientCompany, setClientCompany] = useState(() => loadSavedData('kc_planner_meta', { clientCompany: 'Acme Corp PH' }).clientCompany);
            const [clientRep, setClientRep] = useState(() => loadSavedData('kc_planner_meta', { clientRep: 'Juan Dela Cruz' }).clientRep);
            const [quoteId, setQuoteId] = useState(() => loadSavedData('kc_planner_meta', { quoteId: 'KC-2026-044' }).quoteId);
            const [quoteDate, setQuoteDate] = useState(() => loadSavedData('kc_planner_meta', { quoteDate: getTodayDateString() }).quoteDate);
            const [frictionBuffer, setFrictionBuffer] = useState(() => loadSavedData('kc_planner_meta', { frictionBuffer: 15 }).frictionBuffer);
            const [includeTax, setIncludeTax] = useState(() => loadSavedData('kc_planner_meta', { includeTax: false }).includeTax);
            const [overrideTimeline, setOverrideTimeline] = useState(() => loadSavedData('kc_planner_meta', { overrideTimeline: '' }).overrideTimeline);

            // 3. INVOICE STATE
            const [invoiceMilestone, setInvoiceMilestone] = useState(() => loadSavedData('kc_planner_inv', { milestone: 'full' }).milestone);
            const [invoiceNumberSuffix, setInvoiceNumberSuffix] = useState(() => loadSavedData('kc_planner_inv', { suffix: '01' }).suffix);
            const [invoiceDueDate, setInvoiceDueDate] = useState(() => loadSavedData('kc_planner_inv', { dueDate: 'July 15, 2026' }).dueDate);

            // 4. TIMELINE ENGINE
            const calculatedTimeline = useMemo(() => {
                const selectedProjectTasks = tasks.filter(t => t.selected && !t.isMonthlyRetainer);
                if (selectedProjectTasks.length === 0) return "Ongoing Retainer";
                const totalHours = selectedProjectTasks.reduce((acc, curr) => acc + curr.estHours, 0) * (1 + frictionBuffer / 100);
                const weeks = Math.ceil(totalHours / weeklyHours);
                return weeks <= 1 ? "1 - 2 Weeks" : `${weeks - 1} - ${weeks} Weeks`;
            }, [tasks, frictionBuffer, weeklyHours]);

            const displayTimeline = useMemo(() => overrideTimeline || calculatedTimeline, [overrideTimeline, calculatedTimeline]);

            // 5. FINANCIAL ENGINE
            const getRateForTier = (tier) => {
                if (tier === 'principal') return principalRate;
                if (tier === 'senior') return seniorRate;
                if (tier === 'associate') return associateRate;
                return partnerRate;
            };

            const projectCostBase = useMemo(() => {
                const projTasks = tasks.filter(t => t.selected && !t.isMonthlyRetainer);
                return Math.round(projTasks.reduce((acc, t) => acc + (t.estHours * getRateForTier(t.tier)), 0) * (1 + frictionBuffer/100));
            }, [tasks, frictionBuffer, principalRate, seniorRate, associateRate, partnerRate]);

            const retainerCostBase = useMemo(() => {
                const retTasks = tasks.filter(t => t.selected && t.isMonthlyRetainer);
                return Math.round(retTasks.reduce((acc, t) => acc + (t.estHours * getRateForTier(t.tier)), 0) * (1 + frictionBuffer/100));
            }, [tasks, frictionBuffer, principalRate, seniorRate, associateRate, partnerRate]);

            const updatedSummary = useMemo(() => {
                const subtotalCost = projectCostBase + retainerCostBase;
                const taxValue = includeTax ? Math.round(subtotalCost * 0.12) : 0;
                const totalCost = subtotalCost + taxValue;
                const selected = tasks.filter(t => t.selected);
                return { 
                    count: selected.length, 
                    subtotalCost, taxValue, totalCost,
                    estHours: Math.round(selected.reduce((acc, t) => acc + t.estHours, 0) * (1 + frictionBuffer/100))
                };
            }, [projectCostBase, retainerCostBase, includeTax, tasks, frictionBuffer]);

            const computedInvoiceCost = useMemo(() => {
                let base = 0;
                if (invoiceMilestone === 'full') base = projectCostBase + retainerCostBase;
                else if (invoiceMilestone === 'kickoff_50') base = Math.round(projectCostBase * 0.5);
                else if (invoiceMilestone === 'handover_50') base = Math.round(projectCostBase * 0.5);
                else if (invoiceMilestone === 'kickoff_30') base = Math.round(projectCostBase * 0.3);
                else if (invoiceMilestone === 'mid_40') base = Math.round(projectCostBase * 0.4);
                else if (invoiceMilestone === 'final_30') base = Math.round(projectCostBase * 0.3);
                else if (invoiceMilestone === 'retainer') base = retainerCostBase;
                const vat = includeTax ? Math.round(base * 0.12) : 0;
                return { base, vat, total: base + vat };
            }, [invoiceMilestone, projectCostBase, retainerCostBase, includeTax]);

            const invoiceLineItemDescription = useMemo(() => {
                const taxM = includeTax ? 1.12 : 1;
                if (invoiceMilestone === 'full') return `100% Full Payment of Professional Fees under SOW-${quoteId} (${formatCurrency(Math.round((projectCostBase+retainerCostBase)*taxM))})`;
                if (invoiceMilestone === 'kickoff_50') return `MOD 0 Operational Diagnostics Kickoff (50% of Project Contract: ${formatCurrency(Math.round(projectCostBase*taxM))})`;
                if (invoiceMilestone === 'handover_50') return `MOD 0 Operational Diagnostics Handover (50% of Project Contract: ${formatCurrency(Math.round(projectCostBase*taxM))})`;
                if (invoiceMilestone === 'retainer') return `MOD III Monthly Fractional Retainer & Strategic Governance`;
                return `Strategic Advisory Milestone Payment under SOW-${quoteId}`;
            }, [invoiceMilestone, projectCostBase, retainerCostBase, quoteId, includeTax]);

            // 6. HANDLERS
            const executeResetWorkbook = () => {
                localStorage.clear();
                window.location.reload();
            };
            const toggleTask = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, selected: !t.selected } : t));
            const handlePrint = () => window.print();

            const proposalSummaryText = useMemo(() => {
                const active = tasks.filter(t => t.selected);
                let out = `PROPOSAL SUMMARY\nTimeline: ${displayTimeline}\nTotal Investment: ${formatCurrency(updatedSummary.totalCost)}\n\nSCOPE:\n`;
                active.forEach(t => out += `- ${t.deliverable}\n`);
                return out;
            }, [tasks, updatedSummary, displayTimeline]);

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = proposalSummaryText;
                document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            };

            // 7. PERSISTENCE
            useEffect(() => { localStorage.setItem('kc_planner_tasks', JSON.stringify(tasks)); }, [tasks]);
            useEffect(() => { localStorage.setItem('kc_planner_weekly_hours', JSON.stringify(weeklyHours)); }, [weeklyHours]);
            useEffect(() => { localStorage.setItem('kc_planner_meta', JSON.stringify({ clientCompany, clientRep, quoteId, quoteDate, frictionBuffer, includeTax, overrideTimeline })); }, [clientCompany, clientRep, quoteId, quoteDate, frictionBuffer, includeTax, overrideTimeline]);
            useEffect(() => { localStorage.setItem('kc_planner_inv', JSON.stringify({ milestone: invoiceMilestone, suffix: invoiceNumberSuffix, dueDate: invoiceDueDate })); }, [invoiceMilestone, invoiceNumberSuffix, invoiceDueDate]);

            return (
                <div className="font-sans min-h-screen text-slate-300">
                    <header className="border-b border-brandNavy-700/50 bg-brandNavy-950/95 sticky top-0 z-50 backdrop-blur-md no-print">
                        <div className="max-w-[1600px] mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <IconWebsiteLogo />
                                <div>
                                    <span className="font-extrabold text-lg uppercase block text-white leading-none">KOLTHOFF CONSULTING</span>
                                    <span className="text-[9px] text-brandBlue-400 font-mono tracking-widest uppercase block mt-1 font-bold">Internal Partner Portal</span>
                                </div>
                            </div>
                            <nav className="flex gap-4">
                                {['sandbox', 'proposal', 'quotation', 'invoice'].map((v, i) => (
                                    <button key={v} onClick={() => setView(v)} className={`px-4 py-2 rounded font-mono text-[10px] uppercase font-bold border transition-all ${view === v ? 'bg-brandBlue-500 text-white border-brandBlue-500' : 'bg-brandNavy-900 border-brandNavy-750 hover:bg-brandNavy-800'}`}>{i+1}. {v}</button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <div className="p-8 max-w-[1600px] mx-auto">
                        {view === 'sandbox' && (
                            <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 animate-fade-in">
                                <div className="xl:col-span-9 space-y-6">
                                    <div className="bg-brandNavy-900 border border-brandNavy-700 p-6 rounded-xl shadow-2xl grid grid-cols-4 gap-4">
                                        <div><label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Principal (₱/hr)</label><input type="number" value={principalRate} onChange={e => setPrincipalRate(Number(e.target.value))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-xs font-mono text-brandBlue-300" /></div>
                                        <div><label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Senior (₱/hr)</label><input type="number" value={seniorRate} onChange={e => setSeniorRate(Number(e.target.value))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-xs font-mono text-brandBlue-300" /></div>
                                        <div><label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Associate (₱/hr)</label><input type="number" value={associateRate} onChange={e => setAssociateRate(Number(e.target.value))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-xs font-mono text-brandBlue-300" /></div>
                                        <div><label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Partner (₱/hr)</label><input type="number" value={partnerRate} onChange={e => setPartnerRate(Number(e.target.value))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-xs font-mono text-brandBlue-300" /></div>
                                    </div>
                                    <div className="bg-brandNavy-900 border border-brandNavy-700 rounded-xl overflow-hidden shadow-2xl">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-brandNavy-950 text-[10px] uppercase font-mono tracking-widest text-slate-400 border-b border-brandNavy-700"><th className="p-4 w-[50px]">Act</th><th className="p-4">Deliverable Specification</th><th className="p-4 text-center">Hours</th><th className="p-4 text-center">Tier</th><th className="p-4 text-right">Base Price</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-brandNavy-700/50">
                                                {tasks.map(t => (
                                                    <tr key={t.id} className={t.selected ? 'bg-brandNavy-900/40' : 'opacity-30'}>
                                                        <td className="p-4 text-center"><button onClick={() => toggleTask(t.id)}>{t.selected ? <IconCheckSquare /> : <IconSquare />}</button></td>
                                                        <td className="p-4"><div><span className="text-[9px] font-mono text-brandBlue-400 font-bold uppercase">{t.category}</span><div className="font-bold text-sm text-slate-200">{t.deliverable}</div><div className="text-[10px] text-slate-500">{t.description}</div></div></td>
                                                        <td className="p-4 text-center"><input type="number" value={t.estHours} className="w-16 bg-brandNavy-950 border border-brandNavy-700 rounded text-center text-xs p-1" disabled /></td>
                                                        <td className="p-4 text-center text-[10px] font-mono uppercase">{t.tier}</td>
                                                        <td className="p-4 text-right font-mono text-xs font-bold text-slate-100">{formatCurrency(t.estHours * getRateForTier(t.tier))}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="xl:col-span-3 space-y-6">
                                    <div className="bg-brandNavy-900 border border-brandNavy-700 rounded-xl p-6 shadow-2xl space-y-6">
                                        <h3 className="text-xs font-bold tracking-widest text-brandBlue-400 uppercase font-mono">Engagement Parameters</h3>
                                        <div className="space-y-4">
                                            <div><div className="flex justify-between mb-1.5"><span className="text-[10px] font-mono text-slate-400 uppercase">Weekly Velocity</span><span className="text-xs font-bold text-brandBlue-400">{weeklyHours}h / wk</span></div><input type="range" min="4" max="40" step="4" value={weeklyHours} onChange={e => setWeeklyHours(Number(e.target.value))} className="w-full accent-brandBlue-500 h-1 bg-brandNavy-950 rounded-lg" /></div>
                                            <div><div className="flex justify-between mb-1.5"><span className="text-[10px] font-mono text-slate-400 uppercase">Risk Buffer</span><span className="text-xs font-bold text-brandBlue-400">+{frictionBuffer}%</span></div><input type="range" min="0" max="30" step="5" value={frictionBuffer} onChange={e => setFrictionBuffer(Number(e.target.value))} className="w-full accent-brandBlue-500 h-1 bg-brandNavy-950 rounded-lg" /></div>
                                        </div>
                                        <div className="pt-6 border-t border-brandNavy-700 space-y-3">
                                            <div className="flex justify-between text-xs"><span>Total Hours:</span><span className="font-bold text-slate-100 font-mono">{updatedSummary.estHours} hrs</span></div>
                                            <div className="flex justify-between text-xs"><span>Est. Duration:</span><span className="font-bold text-brandBlue-400 font-mono">{displayTimeline}</span></div>
                                            <div className="flex justify-between text-lg font-bold text-white pt-3 border-t border-brandNavy-700"><span>Subtotal:</span><span className="text-emerald-400 font-mono">{formatCurrency(updatedSummary.subtotalCost)}</span></div>
                                        </div>
                                        <button onClick={() => setShowResetConfirm(true)} className="w-full py-2 bg-brandNavy-950 text-slate-500 text-[9px] uppercase font-bold border border-brandNavy-700 rounded">Reset App</button>
                                        {showResetConfirm && <div className="p-3 bg-rose-950/20 border border-rose-900 rounded text-center"><span className="text-[10px] block mb-2">Confirm Wiping Cache?</span><div className="flex gap-2 justify-center"><button onClick={executeResetWorkbook} className="bg-rose-600 px-3 py-1 rounded text-[9px] font-bold">Yes</button><button onClick={() => setShowResetConfirm(false)} className="bg-brandNavy-800 px-3 py-1 rounded text-[9px] font-bold">No</button></div></div>}
                                    </div>
                                    <div className="bg-brandNavy-900 border border-brandNavy-700 rounded-xl p-6 shadow-2xl">
                                        <div className="flex justify-between items-center mb-4"><h3 className="text-xs font-bold text-slate-300 uppercase font-mono">SOW Generator</h3><button onClick={copyToClipboard} className="text-[10px] font-bold text-brandBlue-400 uppercase">{copied ? 'Copied' : 'Copy'}</button></div>
                                        <div className="bg-brandNavy-950 p-4 rounded text-[10px] font-mono text-slate-500 whitespace-pre-line leading-relaxed h-48 overflow-y-auto">{proposalSummaryText}</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'proposal' && (
                            <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 animate-fade-in">
                                <div className="xl:col-span-4 bg-brandNavy-900 border border-brandNavy-700 p-6 rounded-xl space-y-4">
                                    <h3 className="text-sm font-bold text-brandBlue-400 uppercase font-mono mb-4">SOW Settings</h3>
                                    <div><label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Company</label><input type="text" value={clientCompany} onChange={e => setClientCompany(e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-white" /></div>
                                    <div><label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Timeline Override</label><div className="flex gap-2"><input type="text" value={overrideTimeline} onChange={e => setOverrideTimeline(e.target.value)} placeholder={calculatedTimeline} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-white" />{overrideTimeline && <button onClick={() => setOverrideTimeline('')} className="bg-brandNavy-800 px-2 rounded text-[10px]">Auto</button>}</div></div>
                                    <button onClick={handlePrint} className="w-full py-3 bg-brandBlue-500 text-white font-bold rounded-lg text-xs uppercase mt-6">Print SOW</button>
                                </div>
                                <div className="xl:col-span-8 bg-white text-slate-900 p-12 rounded-xl shadow-2xl print-card font-sans">
                                    <div className="flex justify-between items-center pb-8 border-b-2 border-brandBlue-500 mb-8">
                                        <div className="flex items-center gap-4"><IconWebsiteLogo className="text-brandBlue-600" /><div><h1 className="font-black text-xl text-slate-900 leading-none">KOLTHOFF <span className="text-brandBlue-600">CONSULTING</span></h1><span className="text-[9px] text-slate-500 font-mono font-bold uppercase mt-1 block">Operational Architecture</span></div></div>
                                        <div className="text-right text-[11px] font-mono text-slate-600"><div>Reference: {quoteId}</div><div>Timeline: <span className="font-bold text-slate-900">{displayTimeline}</span></div></div>
                                    </div>
                                    <div className="mb-10"><h4 className="text-[10px] font-mono uppercase text-slate-400 font-bold mb-4">Service Particulars</h4><div className="space-y-3">{tasks.filter(t => t.selected).map(t => (<div key={t.id} className="border border-slate-200 rounded p-4 bg-slate-50/50"><div className="flex justify-between items-center mb-1"><span className="text-[11px] font-bold text-brandBlue-600">{t.deliverable}</span><span className="text-[9px] font-mono text-slate-400 uppercase">{t.category}</span></div><p className="text-[10px] text-slate-600 leading-relaxed">{t.description}</p></div>))}</div></div>
                                    <div className="pt-8 border-t border-slate-200 grid grid-cols-2 gap-24"><div className="space-y-12"><p className="text-slate-400 font-bold text-xs">Accepted by:</p><div className="border-t border-slate-300 pt-2 text-[10px] font-bold">{clientRep}</div></div><div className="space-y-12 text-right"><p className="text-slate-400 font-bold text-xs">Submitted by:</p><div className="border-t border-slate-300 pt-2 text-[10px] font-bold">Principal Consultant</div></div></div>
                                </div>
                            </div>
                        )}

                        {view === 'quotation' && (
                            <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 animate-fade-in">
                                <div className="xl:col-span-4 bg-brandNavy-900 border border-brandNavy-700 p-6 rounded-xl space-y-4">
                                    <div className="flex items-center justify-between bg-brandNavy-950 p-3 rounded-lg"><span className="text-[10px] font-mono text-slate-400 uppercase font-bold">Include 12% VAT</span><button onClick={() => setIncludeTax(!includeTax)} className={`w-10 h-6 flex items-center rounded-full p-0.5 transition-all ${includeTax ? 'bg-brandBlue-500' : 'bg-brandNavy-800'}`}><span className={`w-5 h-5 rounded-full bg-white shadow transform transition-all ${includeTax ? 'translate-x-4' : 'translate-x-0'}`} /></button></div>
                                    <button onClick={handlePrint} className="w-full py-3 bg-brandBlue-500 text-white font-bold rounded-lg text-xs uppercase mt-6">Print Quotation</button>
                                </div>
                                <div className="xl:col-span-8 bg-white text-slate-900 p-12 rounded-xl shadow-2xl print-card font-sans">
                                    <div className="flex justify-between items-center pb-8 border-b-2 border-brandBlue-500 mb-8">
                                        <div className="flex items-center gap-4"><IconWebsiteLogo className="text-brandBlue-600" /><div><h1 className="font-black text-xl text-slate-900 leading-none">KOLTHOFF <span className="text-brandBlue-600">CONSULTING</span></h1><span className="text-[9px] text-slate-500 font-mono font-bold uppercase mt-1 block">Official Quotation</span></div></div>
                                        <div className="text-right text-[11px] font-mono text-slate-600"><div>Reference: {quoteId}</div><div>Timeline: <span className="font-bold text-slate-900">{displayTimeline}</span></div></div>
                                    </div>
                                    <div className="border border-slate-200 rounded-lg overflow-hidden mb-8"><table className="w-full text-left border-collapse text-[11px]"><thead className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase text-[9px] tracking-wider"><tr><th className="p-4 w-[30%]">Module</th><th className="p-4">Deliverable Summary</th></tr></thead><tbody className="divide-y divide-slate-100">{tasks.filter(t => t.selected).map(t => (<tr key={t.id}><td className="p-4 align-top font-bold text-brandBlue-600 uppercase text-[9px]">{t.category}</td><td className="p-4 align-top"><div className="font-bold text-slate-900">{t.deliverable}</div><div className="text-[10px] text-slate-500 mt-0.5 leading-relaxed">{t.description}</div></td></tr>))}</tbody></table></div>
                                    <div className="flex justify-end"><div className="w-[300px] space-y-2 border-t-2 border-slate-100 pt-4"><div className="flex justify-between text-xs"><span>Subtotal:</span><span className="font-bold">{formatCurrency(updatedSummary.subtotalCost)}</span></div>{includeTax && <div className="flex justify-between text-xs text-slate-500"><span>12% VAT:</span><span>{formatCurrency(updatedSummary.taxValue)}</span></div>}<div className="flex justify-between text-lg font-black text-brandBlue-600 pt-2 border-t border-slate-200"><span>Total Due:</span><span>{formatCurrency(updatedSummary.totalCost)}</span></div></div></div>
                                    <div className="mt-12 p-6 bg-slate-50 rounded-xl border border-slate-200"><h4 className="text-[10px] font-bold text-slate-400 uppercase mb-3">Billing Schedule</h4><div className="space-y-3">{projectCostBase > 0 && <div className="flex justify-between text-xs"><span>Project Implementation (100%)</span><span className="font-bold text-brandBlue-600">{formatCurrency(Math.round(projectCostBase * (includeTax ? 1.12 : 1)))}</span></div>}{retainerCostBase > 0 && <div className="flex justify-between text-xs"><span>Monthly Fractional Retainer</span><span className="font-bold text-brandBlue-600">{formatCurrency(Math.round(retainerCostBase * (includeTax ? 1.12 : 1)))} / Month</span></div>}</div></div>
                                </div>
                            </div>
                        )}

                        {view === 'invoice' && (
                            <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 animate-fade-in">
                                <div className="xl:col-span-4 bg-brandNavy-900 border border-brandNavy-700 p-6 rounded-xl space-y-4">
                                    <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Billing Milestone</label>
                                    <select value={invoiceMilestone} onChange={e => setInvoiceMilestone(e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-white"><option value="full">100% Full Payment</option><option value="kickoff_50">50% Kickoff</option><option value="handover_50">50% Handover</option><option value="retainer">Monthly Retainer</option></select>
                                    <button onClick={handlePrint} className="w-full py-3 bg-brandBlue-500 text-white font-bold rounded-lg text-xs uppercase mt-6">Print Tax Invoice</button>
                                </div>
                                <div className="xl:col-span-8 bg-white text-slate-900 p-12 rounded-xl shadow-2xl print-card font-sans">
                                    <div className="flex justify-between items-center pb-8 border-b-2 border-brandBlue-500 mb-8">
                                        <div className="flex items-center gap-4"><IconWebsiteLogo className="text-brandBlue-600" /><div><h1 className="font-black text-xl text-slate-900 leading-none">KOLTHOFF <span className="text-brandBlue-600">CONSULTING</span></h1><span className="text-[9px] text-slate-500 font-mono font-bold uppercase mt-1 block">Official Tax Invoice</span></div></div>
                                        <div className="text-right text-[11px] font-mono text-slate-600"><div>Invoice No: {quoteId.replace('KC','INV')}{invoiceNumberSuffix}</div><div>Date: {quoteDate}</div></div>
                                    </div>
                                    <div className="border border-slate-200 rounded-lg overflow-hidden mb-8"><table className="w-full text-left border-collapse text-[11px]"><thead className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase text-[9px]"><tr><th className="p-4 w-[70%]">Description</th><th className="p-4 text-right">Amount</th></tr></thead><tbody className="divide-y divide-slate-100"><tr><td className="p-5 align-top"><div className="font-bold text-slate-900">{invoiceLineItemDescription}</div><div className="text-[10px] text-slate-400 mt-1 leading-relaxed">Professional advisory and operational re-engineering services as per master agreement.</div></td><td className="p-5 text-right align-top font-mono font-bold text-slate-900 text-sm">{formatCurrency(computedInvoiceCost.base)}</td></tr></tbody></table></div>
                                    <div className="flex justify-end"><div className="w-[300px] space-y-2 border-t-2 border-slate-100 pt-4"><div className="flex justify-between text-xs"><span>Subtotal:</span><span className="font-bold">{formatCurrency(computedInvoiceCost.base)}</span></div>{includeTax && <div className="flex justify-between text-xs text-slate-500"><span>12% VAT:</span><span>{formatCurrency(computedInvoiceCost.vat)}</span></div>}<div className="flex justify-between text-lg font-black text-brandBlue-600 pt-2 border-t border-slate-200"><span>Total Due:</span><span>{formatCurrency(computedInvoiceCost.total)}</span></div></div></div>
                                    <div className="mt-12 text-[10px] text-slate-400 border-t pt-8 space-y-2 font-mono"><div>Bank: BDO Unibank Inc.</div><div>Account: Reinhard Ludwig A. Kolthoff</div><div>No: 0039 5019 0761</div></div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
