                                                <tr className="bg-slate-50 border-b border-slate-200 text-slate-600 uppercase font-mono text-[9px] tracking-wider font-bold font-sans font-extrabold">

                                                    <th className="py-3 px-4 w-[70%]">SOW Deliverables & Objectives</th>

                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-medium">

                                                            <td className="py-3 px-4 align-top text-slate-800"><div className="font-bold text-slate-900 font-sans">{task.deliverable}</div><div className="text-[10px] text-slate-505 mt-0.5 leading-relaxed font-sans">{task.description}</div></td>
                                                        </tr>
                                                    );
                                                })}

                                        </table>
                                    </div>

                                    {/* Quote Totals block */}

                                        <div className="text-xs text-slate-555 max-w-md leading-relaxed text-left font-sans font-medium">
                                            <strong className="text-slate-700 block mb-1 font-bold font-sans">Fixed Flat-Rate Guarantee:</strong> All pricing is flat-rate and outcome-driven, ensuring zero scope-creep modifications or hourly calculation overruns.
                                            
                                            {frictionBuffer > 0 && (
                                                <div className="mt-2 text-slate-555 text-[10px] font-sans">
                                                    * Grand total includes a built-in <strong className="text-slate-700 font-sans font-bold">+{frictionBuffer}% Operational Risk Contingency Reserve</strong> to cover potential timeline and requirements variance during client discovery sprint loops.
                                                </div>
                                            )}

                                            <div className="mt-4 pt-3 border-t border-slate-200"><strong className="text-brandBlue-600 print-accent block mb-1 uppercase tracking-wider text-[10px] font-mono font-bold font-sans">B2B Financial ROI Projection:</strong><span className="text-xs text-slate-755 leading-normal">Estimated Annual Corporate Leakage: <strong className="text-slate-900 font-mono font-bold">{formatCurrency(annualInactionCost)}</strong>. Expected Year 1 Profit Recovery: <strong className="text-emerald-600 font-mono font-bold">{formatCurrency(updatedSummary.netFirstYearSavings)}</strong> (ROI of <strong className="text-emerald-600 font-mono font-bold">{updatedSummary.projectROI}%</strong>).</span></div>
                                        </div>
                                        <div className="text-right space-y-1.5 shrink-0 min-w-[250px] border-l border-slate-200 pl-6 flex flex-col justify-center">
                                            <div className="flex justify-between items-center text-slate-605 font-mono text-xs mb-1"><span>Estimated Duration:</span><span className="font-bold text-slate-900">{calculatedTimeline}</span></div>
                                            <div className="flex justify-between items-center text-xs text-slate-605 border-t border-slate-200 pt-2 font-mono"><span>Scope Net Subtotal:</span><span className="font-bold text-slate-900">{formatCurrency(updatedSummary.subtotalCost)}</span></div>
                                            {includeTax && <div className="flex justify-between items-center text-xs text-slate-500 font-mono"><span>Philippine VAT (12%):</span><span className="font-bold">{formatCurrency(updatedSummary.taxValue)}</span></div>}
                                            <div className="flex justify-between items-center text-base font-bold text-slate-955 pt-2 border-t border-slate-200"><span>Total Investment:</span><span className="text-brandBlue-600 print-accent text-lg font-serif font-black">{formatCurrency(updatedSummary.totalCost)}{updatedSummary.isRetainerOnly && " / Month"}</span></div>
                                        </div>
                                    </div>

                                    {/* Milestone Billing Grid */}
                                    <div className="mb-8 font-semibold">
                                        <h4 className="text-[10px] font-mono uppercase tracking-wider text-slate-400 font-bold mb-3 font-sans">Structured Billing Schedule</h4>
                                        
                                        {/* RETAINER PORTION RUNNING CONCURRENTLY */}
                                        {retainerCostPart > 0 && (
                                            <div className="p-4 bg-slate-50 rounded-xl border border-slate-200 print-pill mb-4">

                                                    <span>MOD III - Ongoing Monthly Retainer Service</span>
                                                    <span className="text-brandBlue-600 print-accent font-mono font-bold">{formatCurrency(retainerCostPart)} / Month</span>
                                                </div>
                                                <p className="text-[11px] text-slate-555 mt-2 leading-relaxed">
                                                    This operational service covers continuous fractional COO governance and partner-managed network SLA retainers. Billing is conducted flat-rate at the beginning of each active service month with a defined initial commitment period of <strong>six (6) months</strong>.
                                                </p>
                                            </div>
                                        )}

                                        {/* PROJECT-BASED MODULE BILLING PIPELINE */}
                                        {projectCostPart > 0 && (
                                            <div>
                                                {/* CASE A: ONLY DIAGNOSTICS (MOD 0) SELECTED */}
                                                {!activeSOP && !activePMO ? (
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs font-sans font-medium">
                                                        <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                            <div className="font-bold text-slate-800 font-sans font-semibold">1. MOD 0 Kickoff & Mobilization (50%)</div>
                                                            <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">{formatCurrency(projectCostPart * 0.5)}</span>
                                                        </div>
                                                        <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                            <div className="font-bold text-slate-800 font-sans font-semibold">2. MOD 0 Handover & Boardroom Debrief (50%)</div>
                                                            <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">{formatCurrency(projectCostPart * 0.5)}</span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    /* CASE B: MULTI-MODULE ENGAGEMENT (MOD 0 + MOD I / MOD II) */
                                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs font-sans font-medium">
                                                        <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                            <div className="font-bold text-slate-800 font-sans font-semibold">1. MOD 0 Mobilization & Discovery (30%)</div>
                                                            <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">{formatCurrency(projectCostPart * 0.3)}</span>
                                                        </div>
                                                        <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                            <div className="font-bold text-slate-800 font-sans font-semibold">2. MOD I SOP & RACI Handover (40%)</div>
                                                            <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">{formatCurrency(projectCostPart * 0.4)}</span>
                                                        </div>
                                                        <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                            <div className="font-bold text-slate-800 font-sans font-semibold">3. MOD II Systems Training Sign-off (30%)</div>
                                                            <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">{formatCurrency(projectCostPart * 0.3)}</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    {/* Standard terms of service */}
                                    <div className="text-[9px] text-slate-555 space-y-2 pb-6 border-b border-slate-200 mb-8 print-divider leading-relaxed">
                                        <strong className="text-slate-700 block text-[10px] uppercase font-mono font-bold font-sans font-semibold font-bold font-sans font-extrabold">Standard Professional Terms</strong>
                                        <p>1. <strong>Scope of Services & Scope Variations:</strong> Services are strictly limited to the SOW items selected. Any modifications requested by the Client shall require a signed Change Order specifying additional hours and timeline extensions.</p>
                                        <p>2. <strong>Client Cooperation & Operational Timelines:</strong> Project timelines remain suspended if critical data dependencies or stakeholder calendars are delayed by the Client by more than 5 business days.</p>
                                        <p>3. <strong>Professional Compensation, Taxes, and Late Payments:</strong> Total professional fees are ex-VAT. Invoice settlement is required within seven (7) business days of receipt.</p>
                                        <p>4. <strong>Intellectual Property Rights:</strong> Upon receipt of full and final payment, the Client shall own all custom playbooks, handbooks, and process maps drafted specifically for this engagement.</p>
                                        <p>5. <strong>Strategic Partner Managed IT Clause:</strong> Continuous cybersecurity, endpoint monitoring, network audits, and IT infrastructure SLA operations under MOD III - COO & Retainers are executed and maintained by Kolthoff Consulting's authorized strategic technology partner under direct principal supervision, governed strictly under our master corporate Service Level Agreement (SLA).</p>
                                        <p>6. <strong>Limitation of Liability & Operational Indemnity:</strong> In no event shall Kolthoff Consulting's liability exceed the total fees paid by the Client under this quotation.</p>
                                        <p>7. <strong>Dispute Resolution & Jurisdiction:</strong> Disputes arising from this contract shall fall under the exclusive jurisdiction of the courts of Taytay, Rizal, Calabarzon.</p>
                                        <div className="mt-4 pt-3 border-t border-slate-100">
                                            <strong className="text-slate-700 block text-[10px] uppercase font-mono font-bold font-sans font-semibold font-bold font-sans font-extrabold">Settlement & Bank Details</strong>
                                            <div className="ml-4 pl-3 border-l-2 border-brandBlue-500 font-mono text-[9px] text-slate-755 space-y-0.5 bg-slate-50 py-1.5 rounded">
                                                <div>Bank Name: <strong>BDO Unibank Inc.</strong></div>
                                                <div>Account Name: <strong>Reinhard Ludwig A. Kolthoff</strong></div>
                                                <div>Account Number: <strong>0039 5019 0761</strong></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-8 text-xs font-sans font-semibold">
                                        <div className="grid grid-cols-2 gap-12 sm:gap-24">

                                                <p className="text-slate-655 font-bold font-sans">Approved and Accepted by:</p>
                                                <div className="border-t border-slate-300 pt-2 text-[10px] space-y-0.5 font-sans">
                                                    <div className="font-bold text-slate-900">{clientRep}</div>
                                                    <div className="text-slate-505">Representative, {clientCompany}</div>
                                                    <div className="text-slate-400">Date: ________________________</div>
                                                </div>
                                            </div>
                                            <div className="space-y-12 flex flex-col justify-between">
                                                <p className="text-slate-655 font-bold font-sans">Submitted by:</p>
                                                <div className="border-t border-slate-300 pt-2 text-[10px] space-y-0.5">
                                                    <div className="font-bold text-slate-900 font-sans">{preparedBy}</div>
                                                    <div className="text-slate-550">{preparerTitle}, Kolthoff Consulting</div>
                                                    <div className="text-slate-400">Date: {quoteDate}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render the virtual DOM mount standard
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render((<App />));
    </script>
</body>
