<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolthoff Consulting - Proposal Estimate Architect</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel CDN (Compiles JSX inside the browser dynamically) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar adjustments for premium aesthetics */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased selection:bg-sky-500 selection:text-white">

    <!-- Target mount node for React -->
    <div id="root"></div>

    <!-- Inline SVGs mapped as React components to prevent CDN asset mapping issues -->
    <script type="text/babel">
        const { useState, useMemo } = React;

        // Custom Inline Icons
        const IconCheckSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-sky-400"><path d="m9 11 3 3 7-7"/><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
        const IconCalculator = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x1="16" y1="6" y2="6"/><line x1="16" x1="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
        const IconClock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x1="10" y1="11" y2="17"/><line x1="14" x1="14" y1="11" y2="17"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5 text-emerald-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500 shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

        const INITIAL_TASKS = [
            { id: 'diag-1', category: '1. Operational Diagnostics', deliverable: 'Preparation & Onboarding', description: 'Client kickoff meeting, security briefing, and initial corporate data collection.', minHours: 3, maxHours: 4, rate: 2500, selected: true },
            { id: 'diag-2', category: '1. Operational Diagnostics', deliverable: 'Stakeholder Discovery', description: 'Executive stakeholder interviews (structured 1-on-1s with 4-6 core staff).', minHours: 4, maxHours: 6, rate: 2500, selected: true },
            { id: 'diag-3', category: '1. Operational Diagnostics', deliverable: 'On-Site Observation Audit', description: 'Two full days of in-person workflow shadowing, step-timing, and bottlenecks trace.', minHours: 16, maxHours: 20, rate: 2500, selected: true },
            { id: 'diag-4', category: '1. Operational Diagnostics', deliverable: 'Forensic Systemic Audit', description: 'Compliance gap mapping (DOLE exposure) & technology stack subscription review.', minHours: 8, maxHours: 12, rate: 2500, selected: true },
            { id: 'diag-5', category: '1. Operational Diagnostics', deliverable: 'Risk Matrix Formulation', description: 'Synthesizing data into a prioritized Operational Risk Matrix with Quick-Wins.', minHours: 5, maxHours: 8, rate: 2500, selected: true },
            { id: 'diag-6', category: '1. Operational Diagnostics', deliverable: 'Debrief & Roadmap Handover', description: 'Executive presentation of findings and strategic delivery phase options.', minHours: 4, maxHours: 6, rate: 2500, selected: true },
            { id: 'sop-1', category: '2. Scale-Ready SOPs & HR', deliverable: 'Role Inventory & Scope Map', description: 'Mapping current state boundaries, functional responsibilities, and structural loops.', minHours: 10, maxHours: 15, rate: 2500, selected: false },
            { id: 'sop-2', category: '2. Scale-Ready SOPs & HR', deliverable: 'Swimlane Process Mapping', description: 'Drafting high-fidelity, cross-functional Swimlane flow diagrams (up to 5 processes).', minHours: 30, maxHours: 40, rate: 2500, selected: false },
            { id: 'sop-3', category: '2. Scale-Ready SOPs & HR', deliverable: 'HR Templates & Compliance', description: 'Vetting local contracts, drafting standard agreements & employment templates.', minHours: 15, maxHours: 25, rate: 2500, selected: false },
            { id: 'sop-4', category: '2. Scale-Ready SOPs & HR', deliverable: 'Employee Handbook Assembly', description: 'Compiling core behavioral rules, leaves, benefits, and standard conduct codes.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'sop-5', category: '2. Scale-Ready SOPs & HR', deliverable: 'Operations Playbook Launch', description: 'Publishing and indexing physical and digital documentation ready for internal training.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'sop-6', category: '2. Scale-Ready SOPs & HR', deliverable: 'Handover & Training Workshops', description: 'Interactive leadership alignment sessions to ensure immediate systems adoption.', minHours: 5, maxHours: 8, rate: 2500, selected: false },
            { id: 'trans-1', category: '3. 90-Day Transformation Sprint', deliverable: 'Value Stream Mapping (VSM)', description: 'Hosting continuous value-mapping sprints to expose systemic operational wastes.', minHours: 20, maxHours: 30, rate: 2500, selected: false },
            { id: 'trans-2', category: '3. 90-Day Transformation Sprint', deliverable: 'Waste & Backlog Elimination', description: 'Conducting tactical sprints targeting excess re-work and bottlenecks in routing loops.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'trans-3', category: '3. 90-Day Transformation Sprint', deliverable: 'Core Metric & KPI Tuning', description: 'Re-engineering custom performance parameters across major team departments.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'trans-4', category: '3. 90-Day Transformation Sprint', deliverable: 'Process Re-engineering', description: 'Complete hands-on overhaul of slow execution paths, templates, and tech links.', minHours: 40, maxHours: 50, rate: 2500, selected: false },
            { id: 'trans-5', category: '3. 90-Day Transformation Sprint', deliverable: 'Implementation Coaching', description: 'On-site coaching alongside process champions to manage team change friction.', minHours: 50, maxHours: 60, rate: 2500, selected: false },
            { id: 'trans-6', category: '3. 90-Day Transformation Sprint', deliverable: 'Dashboard Integration', description: 'Setting up live, visually automated tracking matrices for leadership visibility.', minHours: 15, maxHours: 25, rate: 2500, selected: false },
            { id: 'coo-1', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'Operations Alignment Meetings', description: 'Facilitating critical weekly alignment loops and management checkpoint audits.', minHours: 6, maxHours: 8, rate: 2500, selected: false },
            { id: 'coo-2', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'KPI & OKR Metric Governance', description: 'Evaluating team execution scores and auditing cross-functional performance.', minHours: 8, maxHours: 10, rate: 2500, selected: false },
            { id: 'coo-3', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'Continuous Optimization Sprints', description: 'Iterative audits of workflow efficiency and ongoing manual-step removal.', minHours: 8, maxHours: 10, rate: 2500, selected: false },
            { id: 'coo-4', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'High-Level C-Suite Advisory', description: 'Direct executive mentorship, strategic scaling plans, and labor advisory.', minHours: 4, maxHours: 6, rate: 2500, selected: false }
        ];

        function App() {
            const [tasks, setTasks] = useState(INITIAL_TASKS);
            const [globalRate, setGlobalRate] = useState(2500);
            const [copied, setCopied] = useState(false);
            const [activePreset, setActivePreset] = useState('diagnostics'); // Keeps track of active highlight
            
            const [newTaskCategory, setNewTaskCategory] = useState('1. Operational Diagnostics');
            const [newTaskDeliv, setNewTaskDeliv] = useState('');
            const [newTaskDesc, setNewTaskDesc] = useState('');
            const [newTaskMin, setNewTaskMin] = useState(5);
            const [newTaskMax, setNewTaskMax] = useState(10);

            const handleSelectPackage = (packageName) => {
                setActivePreset(packageName); // Updates active UI class logic
                setTasks(prev => prev.map(t => {
                    let isSelected = false;
                    if (packageName === 'diagnostics' && t.category.includes('1. Operational Diagnostics')) isSelected = true;
                    else if (packageName === 'sop' && t.category.includes('2. Scale-Ready SOPs')) isSelected = true;
                    else if (packageName === 'transformation' && t.category.includes('3. 90-Day Transformation')) isSelected = true;
                    else if (packageName === 'coo' && t.category.includes('4. Fractional COO')) isSelected = true;
                    else if (packageName === 'all') isSelected = true;
                    return { ...t, selected: isSelected };
                }));
            };

            const applyGlobalRate = (rate) => {
                setGlobalRate(rate);
                setTasks(prev => prev.map(t => ({ ...t, rate: rate })));
            };

            const toggleTask = (id) => {
                setActivePreset('custom'); // Shift highlight state if manual changes occur
                setTasks(prev => prev.map(t => t.id === id ? { ...t, selected: !t.selected } : t));
            };

            const updateTaskField = (id, field, value) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, [field]: Number(value) } : t));
            };

            const addNewTask = (e) => {
                e.preventDefault();
                if (!newTaskDeliv) return;
                setActivePreset('custom');
                
                const newTask = {
                    id: `custom-${Date.now()}`,
                    category: newTaskCategory,
                    deliverable: newTaskDeliv,
                    description: newTaskDesc || 'Bespoke client scope requirement.',
                    minHours: Number(newTaskMin),
                    maxHours: Number(newTaskMax),
                    rate: globalRate,
                    selected: true
                };

                setTasks(prev => [...prev, newTask]);
                setNewTaskDeliv('');
                setNewTaskDesc('');
            };

            const removeTask = (id) => {
                setTasks(prev => prev.filter(t => t.id !== id));
            };

            const summary = useMemo(() => {
                const selectedTasks = tasks.filter(t => t.selected);
                return {
                    count: selectedTasks.length,
                    minHours: selectedTasks.reduce((acc, curr) => acc + curr.minHours, 0),
                    maxHours: selectedTasks.reduce((acc, curr) => acc + curr.maxHours, 0),
                    minCost: selectedTasks.reduce((acc, curr) => acc + (curr.minHours * curr.rate), 0),
                    maxCost: selectedTasks.reduce((acc, curr) => acc + (curr.maxHours * curr.rate), 0)
                };
            }, [tasks]);

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val);
            };

            const proposalSummaryText = useMemo(() => {
                const activeOnes = tasks.filter(t => t.selected);
                let output = `### PROPOSAL ESTIMATE SUMMARY - KOLTHOFF CONSULTING\n`;
                output += `* **Total Selected Tasks**: ${summary.count}\n`;
                output += `* **Estimated Hours Scope**: ${summary.minHours} - ${summary.maxHours} Target Hours\n`;
                output += `* **Total Estimated Investment**: ${formatCurrency(summary.minCost)} to ${formatCurrency(summary.maxCost)} (PHP Ex-Tax)\n\n`;
                output += `#### SCOPE OF INCLUDED WORK ITEMS:\n`;
                
                let currentCat = '';
                activeOnes.forEach(t => {
                    if (t.category !== currentCat) {
                        currentCat = t.category;
                        output += `\n**${currentCat.toUpperCase()}**\n`;
                    }
                    output += `- [x] **${t.deliverable}**: ${t.description} (${t.minHours}-${t.maxHours} hrs @ ${formatCurrency(t.rate)}/hr)\n`;
                });
                return output;
            }, [tasks, summary]);

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = proposalSummaryText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div class="p-4 sm:p-6 lg:p-8 max-w-[1600px] mx-auto">
                    {/* Top Header Card */}
                    <div class="mb-8 bg-gradient-to-r from-slate-900 to-slate-950 border border-slate-800 rounded-2xl p-6 relative overflow-hidden shadow-xl">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div>
                                <span class="text-xs font-mono font-semibold tracking-wider text-sky-400 uppercase bg-sky-950/60 border border-sky-800/40 px-2.5 py-1 rounded-full">
                                    Interactive B2B Proposal Modeler
                                </span>
                                <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-100 tracking-tight mt-3">Proposal Estimate Architect</h1>
                                <p class="text-sm text-slate-400 mt-1 max-w-2xl">
                                    Check tasks, adjust hours, and scale rates to align with a client's budget. Overcome price friction by creating visual, itemized scope variations on the fly.
                                </p>
                            </div>
                            
                            <div class="bg-slate-950 p-4 rounded-xl border border-slate-850 text-center md:text-right shrink-0">
                                <span class="text-xs text-slate-400 block font-semibold mb-2">Global Hourly Rate Framework (PHP):</span>
                                <div class="flex gap-2 justify-center">
                                    {[1500, 2500, 3500].map((rate) => (
                                        <button key={rate} onClick={() => applyGlobalRate(rate)} class={`px-4 py-2 text-xs font-bold rounded-lg border transition-all ${globalRate === rate ? 'bg-sky-500 text-slate-950 border-sky-400 shadow-md font-extrabold' : 'text-slate-400 border-slate-800 hover:border-slate-700'}`}>
                                            ₱{rate.toLocaleString()}/hr
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* App Grid */}
                    <div class="grid grid-cols-1 xl:grid-cols-12 gap-8 items-start">
                        {/* Table Framework */}
                        <div class="xl:col-span-9 bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
                            
                            {/* PRESET HIGHLIGHT SECTION */}
                            <div class="p-4 bg-slate-950/60 border-b border-slate-800 flex flex-wrap gap-2 items-center justify-between">
                                <span class="text-xs font-mono tracking-wider text-slate-400 uppercase">Load Scope Presets:</span>
                                <div class="flex flex-wrap gap-1.5">
                                    <button 
                                        onClick={() => handleSelectPackage('diagnostics')} 
                                        class={`px-3 py-1.5 text-xs font-bold rounded-lg border transition-all ${activePreset === 'diagnostics' ? 'bg-sky-500 text-slate-950 border-sky-400 shadow-md font-extrabold' : 'bg-slate-900 text-slate-300 border-slate-800 hover:bg-slate-850'}`}
                                    >
                                        1. Diagnostics Only
                                    </button>
                                    <button 
                                        onClick={() => handleSelectPackage('sop')} 
                                        class={`px-3 py-1.5 text-xs font-bold rounded-lg border transition-all ${activePreset === 'sop' ? 'bg-sky-500 text-slate-950 border-sky-400 shadow-md font-extrabold' : 'bg-slate-900 text-slate-300 border-slate-800 hover:bg-slate-850'}`}
                                    >
                                        2. SOPs Setup
                                    </button>
                                    <button 
                                        onClick={() => handleSelectPackage('transformation')} 
                                        class={`px-3 py-1.5 text-xs font-bold rounded-lg border transition-all ${activePreset === 'transformation' ? 'bg-sky-500 text-slate-950 border-sky-400 shadow-md font-extrabold' : 'bg-slate-900 text-slate-300 border-slate-800 hover:bg-slate-850'}`}
                                    >
                                        3. Transformation
                                    </button>
                                    <button 
                                        onClick={() => handleSelectPackage('coo')} 
                                        class={`px-3 py-1.5 text-xs font-bold rounded-lg border transition-all ${activePreset === 'coo' ? 'bg-sky-500 text-slate-950 border-sky-400 shadow-md font-extrabold' : 'bg-slate-900 text-slate-300 border-slate-800 hover:bg-slate-850'}`}
                                    >
                                        4. COO Retainer
                                    </button>
                                    <button 
                                        onClick={() => handleSelectPackage('all')} 
                                        class={`px-3 py-1.5 text-xs font-bold rounded-lg border transition-all ${activePreset === 'all' ? 'bg-emerald-500 text-slate-950 border-emerald-400 shadow-md font-extrabold' : 'bg-slate-900 text-emerald-400 border-slate-800 hover:bg-slate-850'}`}
                                    >
                                        Select All
                                    </button>
                                </div>
                            </div>

                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse min-w-[1000px] table-fixed">
                                    <thead>
                                        <tr class="bg-slate-950 text-[10px] uppercase font-mono tracking-wider text-slate-400 border-b border-slate-850">
                                            <th class="py-4 px-4 text-center w-[5%]">Incl?</th>
                                            <th class="py-4 px-4 w-[15%]">Work Area</th>
                                            <th class="py-4 px-4 w-[38%]">Task Deliverable</th>
                                            <th class="py-4 px-4 text-center w-[14%]">Hours (Min - Max)</th>
                                            <th class="py-4 px-4 text-center w-[11%]">Rate (PHP)</th>
                                            <th class="py-4 px-4 text-right w-[14%] font-bold text-sky-400">Total Range</th>
                                            <th class="py-4 px-4 text-center w-[3%]"></th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-850/60">
                                        {tasks.map((task) => (
                                            <tr key={task.id} class={`transition-colors duration-150 ${task.selected ? 'bg-slate-900/90' : 'bg-slate-900/25 opacity-40 hover:opacity-75'}`}>
                                                <td class="py-3 px-4 text-center">
                                                    <button onClick={() => toggleTask(task.id)} class="p-1 rounded text-slate-400 hover:text-sky-400 inline-flex">
                                                        {task.selected ? <IconCheckSquare /> : <IconSquare />}
                                                    </button>
                                                </td>
                                                <td class="py-3 px-4">
                                                    <span class="text-[10px] font-mono bg-slate-950 px-2.5 py-1 rounded-md text-slate-300 font-semibold border border-slate-800 block text-center truncate">
                                                        {task.category.replace(/^\d+\.\s/, '')}
                                                    </span>
                                                </td>
                                                <td class="py-3 px-4">
                                                    <h4 class="font-bold text-sm text-slate-100">{task.deliverable}</h4>
                                                    <p class="text-[11px] text-slate-400 mt-0.5 leading-normal line-clamp-2">{task.description}</p>
                                                </td>
                                                <td class="py-3 px-4">
                                                    <div class="flex items-center justify-center gap-1.5">
                                                        <input 
                                                            type="number" 
                                                            min="0" 
                                                            value={task.minHours} 
                                                            onChange={(e) => updateTaskField(task.id, 'minHours', e.target.value)} 
                                                            class="w-12 bg-slate-950 border border-slate-800 rounded px-1.5 py-1 text-xs text-center font-mono font-bold text-slate-200" 
                                                            disabled={!task.selected} 
                                                        />
                                                        <span class="text-slate-600 font-bold">-</span>
                                                        <input 
                                                            type="number" 
                                                            min="0" 
                                                            value={task.maxHours} 
                                                            onChange={(e) => updateTaskField(task.id, 'maxHours', e.target.value)} 
                                                            class="w-12 bg-slate-950 border border-slate-800 rounded px-1.5 py-1 text-xs text-center font-mono font-bold text-slate-200" 
                                                            disabled={!task.selected} 
                                                        />
                                                    </div>
                                                </td>
                                                <td class="py-3 px-4">
                                                    <input type="number" step="100" value={task.rate} onChange={(e) => updateTaskField(task.id, 'rate', e.target.value)} class="w-20 mx-auto bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs text-center font-mono font-bold text-slate-200 block" disabled={!task.selected} />
                                                </td>
                                                <td class="py-3 px-4 text-right">
                                                    <span class="text-xs font-mono font-bold text-slate-200 whitespace-nowrap">
                                                        {formatCurrency(task.minHours * task.rate)} - {formatCurrency(task.maxHours * task.rate)}
                                                    </span>
                                                </td>
                                                <td class="py-3 px-4 text-center">
                                                    <button onClick={() => removeTask(task.id)} class="p-1 text-slate-600 hover:text-rose-400 rounded transition-colors inline-flex"><IconTrash /></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Add Item Row Form */}
                            <form onSubmit={addNewTask} class="p-4 bg-slate-950/40 border-t border-slate-800 grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
                                <div class="md:col-span-3">
                                    <label class="text-[10px] font-mono text-slate-500 uppercase block mb-1">Target Category</label>
                                    <select value={newTaskCategory} onChange={(e) => setNewTaskCategory(e.target.value)} class="w-full bg-slate-900 border border-slate-800 rounded-lg py-1.5 px-2 text-xs text-slate-300">
                                        <option value="1. Operational Diagnostics">1. Diagnostics</option>
                                        <option value="2. Scale-Ready SOPs & HR">2. SOPs & HR</option>
                                        <option value="3. 90-Day Transformation Sprint">3. 90-Day Sprint</option>
                                        <option value="4. Fractional COO (Monthly Engagement)">4. Monthly COO</option>
                                    </select>
                                </div>
                                <div class="md:col-span-3">
                                    <label class="text-[10px] font-mono text-slate-500 uppercase block mb-1">Custom Task Name</label>
                                    <input type="text" placeholder="e.g., Extended ERP Audits" value={newTaskDeliv} onChange={(e) => setNewTaskDeliv(e.target.value)} class="w-full bg-slate-900 border border-slate-800 rounded-lg py-1.5 px-3 text-xs text-slate-200 placeholder-slate-600" />
                                </div>
                                <div class="md:col-span-4">
                                    <label class="text-[10px] font-mono text-slate-500 uppercase block mb-1">Brief Description</label>
                                    <input type="text" placeholder="Specific scope notes..." value={newTaskDesc} onChange={(e) => setNewTaskDesc(e.target.value)} class="w-full bg-slate-900 border border-slate-800 rounded-lg py-1.5 px-3 text-xs text-slate-200 placeholder-slate-600" />
                                </div>
                                <div class="md:col-span-1">
                                    <label class="text-[10px] font-mono text-slate-500 uppercase block mb-1">Min/Max</label>
                                    <div class="flex gap-1">
                                        <input type="number" value={newTaskMin} onChange={(e) => setNewTaskMin(e.target.value)} class="w-12 bg-slate-900 border border-slate-800 rounded-lg py-1.5 text-center text-xs text-slate-200" />
                                        <input type="number" value={newTaskMax} onChange={(e) => setNewTaskMax(e.target.value)} class="w-12 bg-slate-900 border border-slate-800 rounded-lg py-1.5 text-center text-xs text-slate-200" />
                                    </div>
                                </div>
                                <div class="md:col-span-1">
                                    <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-1.5 px-2 rounded-lg text-xs transition-colors flex items-center justify-center shrink-0"><IconPlus /> Add</button>
                                </div>
                            </form>
                        </div>

                        {/* Summary Widget Side Panel */}
                        <div class="xl:col-span-3 space-y-6">
                            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl relative overflow-hidden">
                                <h3 class="text-sm font-bold tracking-wider text-slate-300 uppercase font-mono mb-4 flex items-center gap-2">
                                    <IconCalculator className="text-sky-400" /> Proposal Calculations
                                </h3>

                                <div class="space-y-4 pb-6 border-b border-slate-800 text-xs">
                                    <div class="flex justify-between items-center">
                                        <span class="text-slate-500">Included Line Tasks:</span>
                                        <span class="text-slate-200 font-bold font-mono">{summary.count} / {tasks.length} items</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-slate-500">Estimated Effort:</span>
                                        <span class="text-slate-200 font-bold font-mono flex items-center gap-1">
                                            <IconClock className="text-sky-400" /> {summary.minHours} - {summary.maxHours} hours
                                        </span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-slate-500">Hourly Rate Basis:</span>
                                        <span class="text-slate-200 font-bold font-mono">₱{globalRate.toLocaleString()}/hr</span>
                                    </div>
                                </div>

                                <div class="py-6">
                                    <span class="text-[10px] font-mono tracking-widest text-slate-500 uppercase block">Calculated Package Valuation</span>
                                    <span class="text-2xl sm:text-3xl font-black text-sky-400 mt-1 block leading-tight">
                                        {formatCurrency(summary.minCost)} <span class="text-xs text-slate-500 font-normal block my-1">to</span> {formatCurrency(summary.maxCost)}
                                    </span>
                                    <span class="text-[10px] text-slate-400 block mt-1">Excludes local structural VAT taxes.</span>
                                </div>

                                <div class="p-4 bg-slate-950/60 rounded-xl border border-slate-850 flex gap-2">
                                    <IconInfo />
                                    <div>
                                        <span class="text-[10px] font-bold text-amber-500 uppercase block">Flat-Pricing Strategy</span>
                                        <p class="text-[10px] text-slate-400 mt-1 leading-normal">
                                            Present this total variance range as a predictable flat-rate contract to prevent systemic buyer friction over ticking hour frameworks.
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Markdown Exporter */}
                            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-xs font-bold tracking-wider text-slate-300 uppercase font-mono">SOW Proposal Markdown</h3>
                                    <button onClick={copyToClipboard} class="px-3 py-1.5 bg-slate-950 hover:bg-slate-850 rounded-lg text-xs font-semibold flex items-center transition-all text-sky-400 border border-sky-950">
                                        {copied ? <IconCheckCircle /> : <IconCopy />}
                                        {copied ? 'Copied!' : 'Copy SOW Text'}
                                    </button>
                                </div>
                                <div class="bg-slate-950 rounded-xl p-4 border border-slate-850 text-[11px] text-slate-400 font-mono overflow-y-auto max-h-48 whitespace-pre-line leading-relaxed">
                                    {proposalSummaryText}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the React components inside the virtual DOM mount standard
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
