        // CRITICAL DATA SECURITY: CRYPTOGRAPHIC OBFUSCATION LAYER (RA 10173 COMPLIANT)
        const SecureStorage = {
            encrypt: (rawData, secretKey = 'kolthoff-secure') => {
                const jsonStr = JSON.stringify(rawData);
                let result = '';
                for (let i = 0; i < jsonStr.length; i++) {
                    const charCode = jsonStr.charCodeAt(i) ^ secretKey.charCodeAt(i % secretKey.length);
                    result += String.fromCharCode(charCode);
                }
                return btoa(unescape(encodeURIComponent(result))); // Safe UTF-8 Base64 wrap
            },
            
            decrypt: (encryptedData, secretKey = 'kolthoff-secure') => {
                try {
                    if (!encryptedData) return null;
                    const decoded = decodeURIComponent(escape(atob(encryptedData)));
                    let result = '';
                    for (let i = 0; i < decoded.length; i++) {
                        const charCode = decoded.charCodeAt(i) ^ secretKey.charCodeAt(i % secretKey.length);
                        result += String.fromCharCode(charCode);
                    }
                    return JSON.parse(result);
                } catch (e) {
                    console.error("Decryption failed. Secure local storage block may be unencrypted or corrupted.", e);
                    return null;
                }
            }
        };

        // SAFE ENCRYPTED STATE LOADER
        function loadSavedData(key, fallback) {
            try {
                const saved = localStorage.getItem(key);
                if (!saved) return fallback;
                
                // Attempt decoding as standard JSON first for backwards-compatibility
                try {
                    return JSON.parse(saved);
                } catch (normalError) {
                    // Fall back to cryptographic decryption for secured entries
                    const decrypted = SecureStorage.decrypt(saved);
                    return decrypted !== null ? decrypted : fallback;
                }
            } catch (e) {
                console.error("Local storage secure lookup failed safely. Using fallback.", e);
                return fallback;
            }
        }

        // PERSIST ENCRYPTED SECURE STORAGE
        function persistSecureData(key, data) {
            try {
                const encrypted = SecureStorage.encrypt(data);
                localStorage.setItem(key, encrypted);
            } catch (e) {
                console.error("Secure storage write exception flagged.", e);
            }
        }

        // PHILIPPINE TIN FORMAT VALDATOR & GENERATOR
        function validatePhilippineTIN(tinString) {
            // Standard EOPT format: 123-456-789-000 or 123-456-789-00000 (9 digit root + 3 or 5 digit branch code)
            const tinRegex = /^\d{3}-\d{3}-\d{3}-\d{3,5}$/;
            return tinRegex.test(tinString);
        }

        function formatTINInput(value) {
            const numbers = value.replace(/\D/g, '');
            let formatted = '';
            for (let i = 0; i < numbers.length; i++) {
                if (i === 3 || i === 6 || i === 9) {
                    formatted += '-';
                }
                formatted += numbers[i];
            }
            return formatted.substring(0, 17); // Max length with branch extensions
        }

            const calculatedTimeline = useMemo(() => {

                const projectTasks = selectedTasks.filter(t => !t.isMonthlyRetainer);
                const retainerTasks = selectedTasks.filter(t => t.isMonthlyRetainer);
                
                const totalProjectHours = projectTasks.reduce((acc, curr) => acc + curr.estHours, 0) * (1 + frictionBuffer / 100);
                
                let timelineStr = "";
                if (projectTasks.length > 0) {
                    const exactWeeks = totalProjectHours / weeklyHours;
                    const ceilingWeeks = Math.ceil(exactWeeks);

                        timelineStr = "1 - 2 Weeks";

                        timelineStr = "2 - 3 Weeks";
                    } else {
                        timelineStr = `${ceilingWeeks - 1} - ${ceilingWeeks} Weeks`;

                if (retainerTasks.length > 0) {

            const displayTimeline = useMemo(() => {

            // UNDISCOUNTED MATH PREPARATIONS
            const projectCostBaseUndiscounted = useMemo(() => {

            const retainerCostBaseUndiscounted = useMemo(() => {
                const selectedRetTasks = tasks.filter(t => t.selected && t.isMonthlyRetainer);

                return Math.round(selectedRetTasks.reduce((acc, curr) => {
                    return acc + (curr.estHours * getRateForTier(curr.tier));
                }, 0) * bufferMultiplier);
            }, [tasks, frictionBuffer, principalRate, seniorRate, associateRate, partnerRate]);

            // DYNAMIC DISCOUNTED MATH COMPUTATIONS
            const projectCostBase = useMemo(() => {
                return Math.round(projectCostBaseUndiscounted * (1 - discountPercent / 100));
            }, [projectCostBaseUndiscounted, discountPercent]);

            const retainerCostBase = useMemo(() => {
                return Math.round(retainerCostBaseUndiscounted * (1 - discountPercent / 100));
            }, [retainerCostBaseUndiscounted, discountPercent]);

            const projectCostPart = useMemo(() => {
                const taxMultiplier = includeTax ? 1.12 : 1.0;
                return Math.round(projectCostBase * taxMultiplier);
            }, [projectCostBase, includeTax]);

            const retainerCostPart = useMemo(() => {
                const taxMultiplier = includeTax ? 1.12 : 1.0;
                return Math.round(retainerCostBase * taxMultiplier);
            }, [retainerCostBase, includeTax]);

            const updatedSummary = useMemo(() => {
                const selectedTasks = tasks.filter(t => t.selected);
                const estHoursTotal = selectedTasks.reduce((acc, curr) => acc + curr.estHours, 0);
                const bufferMultiplier = 1 + (frictionBuffer / 100);
                
                const subtotalCost = projectCostBase + retainerCostBase;
                const taxValue = includeTax ? Math.round(subtotalCost * 0.12) : 0;
                const totalCost = subtotalCost + taxValue;

                const principalBaseHours = Math.round(selectedTasks.filter(t => t.tier === 'principal').reduce((acc, curr) => acc + curr.estHours, 0) * bufferMultiplier);
                const seniorBaseHours = Math.round(selectedTasks.filter(t => t.tier === 'senior').reduce((acc, curr) => acc + curr.estHours, 0) * bufferMultiplier);
                const associateBaseHours = Math.round(selectedTasks.filter(t => t.tier === 'associate').reduce((acc, curr) => acc + curr.estHours, 0) * bufferMultiplier);

                const seniorWorkingPool = seniorBaseHours + principalDelegatedHours;

                const seniorFinalHours = seniorWorkingPool - seniorDelegatedHours;

                const partnerFinalHours = partnerBaseHours;

                const principalExecutionRate = 1500;
                const seniorExecutionRate = 800;
                const associateExecutionRate = 350;
                const partnerExecutionRate = 1200;

                    (seniorFinalHours * seniorExecutionRate) +
                    (associateFinalHours * associateExecutionRate) +
                    (partnerFinalHours * partnerExecutionRate)

                const netFirstYearSavings = Math.max(0, annualOperationalLeakage - totalCost);

                                                        onChange={(e) => setCustomInvoiceAmount(Number(e.target.value))} 
                                                        className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded p-2.5 pl-7 text-xs text-slate-202 font-mono font-medium focus:outline-none focus:border-brandTeal-505" 
                                                    />
                                                </div>
                                            </div>
                                        )}

                                        <div>
                                            <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Invoice Suffix</label>
                                            <input 
                                                type="text" value={invoiceNumberSuffix} onChange={(e) => setInvoiceNumberSuffix(e.target.value)} 
                                                className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-slate-202 font-mono font-semibold focus:outline-none focus:border-brandTeal-505 bg-brandNavy-950" 
                                            />
                                        </div>

                                        <div>
                                            <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Payment Due Date</label>
                                            <input 
                                                type="text" placeholder="e.g. July 15, 2026" value={invoiceDueDate} onChange={(e) => setInvoiceDueDate(e.target.value)} 
                                                className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded p-2.5 text-slate-202 font-semibold focus:outline-none focus:border-brandTeal-500 bg-brandNavy-950" 
                                            />
                                        </div>

                                        <div className="flex items-center justify-between bg-brandNavy-955 border border-brandNavy-700 p-3 rounded-lg font-sans bg-brandNavy-950">
                                            <span className="text-[10px] font-mono tracking-wider uppercase text-slate-400 font-bold">Include 12% PH VAT</span>
                                            <button 
                                                onClick={() => setIncludeTax(!includeTax)} 
                                                className={`w-10 h-6 flex items-center rounded-full p-0.5 transition-all duration-300 ${includeTax ? 'bg-brandTeal-500' : 'bg-brandNavy-800 border border-brandNavy-700'}`}
                                            >
                                                <span className={`w-5 h-5 rounded-full bg-white shadow-md transform transition-all duration-300 ${includeTax ? 'translate-x-4' : 'translate-x-0'}`} />
                                            </button>
                                        </div>

                                        {/* INTERACTIVE TIN INPUT VALIDATOR */}
                                        <div>
                                            <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">
                                                Company TIN (BIR EOPT mandated)
                                                {clientTin && (
                                                    <span className={`ml-2 text-[9px] font-mono px-1.5 py-0.5 rounded ${validatePhilippineTIN(clientTin) ? 'bg-emerald-500/15 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/15 text-rose-400 border border-rose-500/20'}`}>
                                                        {validatePhilippineTIN(clientTin) ? '✓ Valid Format' : '✗ Invalid (000-000-000-000)'}
                                                    </span>
                                                )}
                                            </label>
                                            <input 
                                                type="text" 
                                                value={clientTin} 
                                                onChange={(e) => setClientTin(formatTINInput(e.target.value))} 
                                                className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-slate-202 font-mono font-semibold focus:outline-none" 
                                            />
                                        </div>
                                        <div><label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Company Address (BIR mandated)</label><input type="text" value={clientAddress} onChange={(e) => setClientAddress(e.target.value)} className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded p-2.5 text-slate-202 focus:outline-none bg-brandNavy-950" /></div>
                                    </div>
                                    <button onClick={handlePrint} className="w-full py-3 bg-brandTeal-500 hover:bg-brandTeal-400 text-slate-955 font-bold rounded-lg text-xs uppercase tracking-wider flex items-center justify-center shadow-lg"><IconPrint className="w-4 h-4 mr-1.5" /> Print Tax Invoice</button>
                                    <button onClick={() => handleExportToPDF('invoice-print-area', `VAT_Invoice_${quoteId}`)} className="w-full py-3 bg-brandNavy-850 hover:bg-brandNavy-800 text-brandTeal-400 font-bold rounded-lg text-xs uppercase tracking-wider flex items-center justify-center border border-brandNavy-700 shadow-lg mt-2"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF Document</button>
                                </div>

                                <div className="xl:col-span-8 bg-white text-slate-900 border border-slate-200 rounded-xl p-8 sm:p-12 shadow-2xl print-card font-sans font-medium" id="invoice-print-area">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-8 border-b-2 border-brandTeal-500 mb-8 print-card-header gap-6">
                                        <div className="flex items-center gap-4">
                                            <div className="w-14 h-14 bg-brandTeal-50 border border-brandTeal-100 rounded-lg flex items-center justify-center shrink-0"><IconWebsiteLogo className="w-11 h-11" /></div>
                                            <div>
                                                <h1 className="font-sans font-black tracking-wider text-xl uppercase text-slate-900 leading-none">KOLTHOFF <span className="text-brandTeal-600 print-accent font-black">CONSULTING</span></h1>
                                                <span className="text-[9px] text-slate-500 tracking-widest uppercase block mt-1 font-mono font-bold leading-relaxed font-sans">Operational Excellence &amp; Strategy</span>
                                                <div className="flex flex-wrap gap-x-4 gap-y-1 text-[10px] font-mono text-slate-500 mt-2 font-semibold">
                                                    <span className="flex items-center gap-1"><IconMail className="w-3.5 h-3.5 text-brandTeal-600 print-accent" /> contact@kolthoff-consulting.com</span>
                                                    <span className="flex items-center gap-1"><IconGlobe className="w-3.5 h-3.5 text-brandTeal-600 print-accent" /> www.kolthoff-consulting.com</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-left sm:text-right font-mono text-[11px] text-slate-600 space-y-1">
                                            <div className="text-slate-900 font-bold text-sm tracking-wide font-sans">{includeTax ? "VAT SALES INVOICE" : "NON-VAT SALES INVOICE"}</div>
                                            <div className="text-[9px] text-rose-600 font-bold block mb-1">RA 11976 (EOPT) Compliant Billing</div>
                                            <div>Invoice No: <span className="font-bold text-slate-900">{quoteId.replace('KC', 'INV')}{invoiceNumberSuffix}</span></div>
                                            <div>Date Issued: {quoteDate}</div>
                                            <div>Payment Due: <span className="font-bold text-slate-900">{invoiceDueDate || "________________________"}</span></div>
                                            <div>Reference SOW: <span className="font-bold text-slate-900">{quoteId}</span></div>
                                        </div>
                                    </div>

                                    {/* BIR EOPT Mandated Customer Block */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8 text-sm font-sans font-medium">
                                        <div className="space-y-1.5 border-l-2 border-brandTeal-500 pl-4 py-1">
                                            <span className="text-[10px] font-mono uppercase tracking-wider text-slate-400 block font-bold">SOLD TO (Customer Information):</span>
                                            <div className="font-bold text-slate-900 text-base">{clientRep || "________________________"}</div>
                                            <div className="text-slate-705 font-bold font-sans">{clientCompany || "________________________"}</div>
                                            <div className="text-xs text-slate-500 font-mono">TIN: {clientTin || "________________________"}</div>
                                            <div className="text-xs text-slate-555 leading-snug">{clientAddress || "________________________"}</div>
                                        </div>
                                        <div className="space-y-1.5 md:text-right">
                                            <span className="text-[10px] font-mono uppercase tracking-wider text-slate-400 block font-bold">ISSUED BY (Sellers Information):</span>
                                            <div className="font-bold text-slate-900 text-base">{preparedBy}</div>
                                            <div className="text-slate-700 font-bold text-xs">Principal Consultant &amp; Strategist, Kolthoff Consulting</div>
                                            <div className="text-xs text-slate-555 font-mono">TIN: {preparerTin}</div>
                                            <div className="text-xs text-slate-500 font-semibold">Taytay, Rizal, Calabarzon, Philippines</div>
                                        </div>
                                    </div>

                                    <div className="text-xs text-slate-600 mb-6 italic leading-relaxed font-sans font-semibold">
                                        Please find below the itemized billing details for operational support services rendered in accordance with our master project SOW:
                                    </div>

                                    {/* Itemized Invoice Table */}
                                    <div className="border border-slate-200 rounded-lg overflow-hidden mb-6 print-divider font-sans">
                                        <table className="w-full text-left border-collapse text-xs table-fixed font-sans">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200 text-slate-600 uppercase font-mono text-[9px] tracking-wider font-extrabold">
                                                    <th className="py-3 px-4 w-[65%]">Description of Services Rendered</th>
                                                    <th className="py-3 px-4 text-right w-[35%]">Milestone Amount (PHP)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-medium">
                                                <tr>
                                                    <td className="py-5 px-4 align-top text-slate-800">
                                                        <div className="font-bold text-slate-900 font-sans text-xs">{invoiceLineItemDescription}</div>
                                                        <div className="text-[10px] text-slate-500 mt-2 leading-relaxed font-sans">
                                                            SOW mapping, roadblocks discovery, Data Privacy onboarding guidelines, DOLE-aligned employee handbooks, and automated shared workspace setups.
                                                        </div>
                                                    </td>
                                                    <td className="py-5 px-4 text-right align-top font-mono font-bold text-slate-900 text-sm">
                                                        {formatCurrency(computedInvoiceCost.baseAmount)}
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* BIR EOPT COMPLIANT TAX BREAKOUT MATRIX SECTION */}
                                    <div className="mb-8">
                                        <h4 className="text-[9px] font-mono uppercase tracking-wider text-slate-400 font-bold mb-2 font-sans">BIR RA 11976 (EOPT) Revenue Breakout Matrix</h4>
                                        <div className="border border-slate-200 rounded-lg overflow-hidden text-center text-[10px] uppercase font-mono tracking-wider text-slate-600 font-bold font-sans">
                                            <div className="grid grid-cols-4 bg-slate-50 divide-x divide-slate-200 border-b border-slate-200">
                                                <div className="py-2 px-1">VATable Sales</div>
                                                <div className="py-2 px-1">VAT-Exempt</div>
                                                <div className="py-2 px-1">Zero-Rated</div>
                                                <div className="py-2.5 px-1">{includeTax ? "12% VAT Amount" : "Non-VAT / Exempt"}</div>
                                            </div>
                                            <div className="grid grid-cols-4 divide-x divide-slate-200 bg-white text-slate-900 py-2.5">
                                                <div className="font-mono">{includeTax ? formatCurrency(computedInvoiceCost.baseAmount) : "₱0"}</div>
                                                <div className="font-mono">{includeTax ? "₱0" : formatCurrency(computedInvoiceCost.baseAmount)}</div>
                                                <div className="font-mono">₱0</div>
                                                <div className="font-mono">{includeTax ? formatCurrency(computedInvoiceCost.vatAmount) : "₱0"}</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Financial Breakdown */}
                                    <div className="flex flex-col sm:flex-row sm:justify-between items-stretch gap-6 py-6 border-t border-b border-slate-200 mb-8 print-divider text-sm bg-slate-50 p-4 rounded-xl font-semibold">
                                        <div className="text-[11px] text-slate-600 max-w-md leading-relaxed text-left font-sans font-medium flex flex-col justify-between">
                                            <div>
                                                <strong className="text-slate-700 block mb-1 font-bold font-sans">Payment Terms &amp; Guidelines:</strong>
                                                Please settle this invoice amount via local bank transfer using the BDO account details below within <strong>seven (7) business days</strong> of this invoice.
                                            </div>
                                            <div className="mt-4 pt-3 border-t border-slate-200">
                                                <span className="text-[10px] font-mono tracking-widest text-brandTeal-600 print-accent block mb-1 uppercase font-bold font-sans">BDO Remittance Details:</span>
                                                <div className="font-mono text-[9px] text-slate-700 space-y-0.5 bg-slate-50 p-2.5 rounded border border-slate-200">
                                                    <div>Bank Name: <strong>BDO Unibank Inc.</strong></div>
                                                    <div>Account Name: <strong>Reinhard Ludwig A. Kolthoff</strong></div>
                                                    <div>Account Number: <strong>0039 5019 0761</strong></div>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="text-right space-y-1.5 shrink-0 min-w-[270px] border-l border-slate-200 pl-6 flex flex-col justify-center font-sans">
                                            {discountPercent > 0 && (invoiceMilestone === 'full' || invoiceMilestone === 'retainer') ? (
                                                <>
                                                    <div className="flex justify-between items-center text-xs text-slate-555 font-mono">
                                                        <span>Subtotal (Standard):</span>
                                                        <span className="font-bold text-slate-700">{formatCurrency(computedInvoiceCostUndiscounted)}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-xs text-emerald-600 font-mono">
                                                        <span>Partnership Discount ({discountPercent}%):</span>
                                                        <span className="font-bold">- {formatCurrency(computedInvoiceCostUndiscounted - computedInvoiceCost.baseAmount)}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-xs text-slate-600 border-t border-slate-200 pt-1.5 font-mono">
                                                        <span>Discounted Subtotal:</span>
                                                        <span className="font-bold text-slate-900">{formatCurrency(computedInvoiceCost.baseAmount)}</span>
                                                    </div>
                                                </>
                                            ) : (
                                                <div className="flex justify-between items-center text-xs text-slate-600 font-mono">
                                                    <span>Subtotal Ex-Tax:</span>
                                                    <span className="font-bold text-slate-900">{formatCurrency(computedInvoiceCost.baseAmount)}</span>
                                                </div>
                                            )}

                                            {includeTax && (
                                                <div className="flex justify-between items-center text-xs text-slate-500 font-mono">
                                                    <span>VAT (12%):</span>
                                                    <span className="font-bold">{formatCurrency(computedInvoiceCost.vatAmount)}</span>
                                                </div>
                                            )}
                                            <div className="flex justify-between items-center text-base font-bold text-slate-900 pt-2 border-t border-slate-200">
                                                <span>Total Amount Due:</span>
                                                <span className="text-brandTeal-600 print-accent text-lg font-serif font-black">{formatCurrency(computedInvoiceCost.totalAmount)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Signatures */}
                                    <div className="pt-8 text-xs font-sans font-semibold">
                                        <div className="grid grid-cols-2 gap-12 sm:gap-24">
                                            <div className="space-y-12 flex flex-col justify-between">
                                                <p className="text-slate-700 font-bold font-sans">Received &amp; Authorized by:</p>
                                                <div className="border-t border-slate-300 pt-2 text-[10px] space-y-0.5 font-sans">
                                                    <div className="font-bold text-slate-900">{clientRep || "________________________"}</div>
                                                    <div className="text-slate-500">Representative, {clientCompany || "________________________"}</div>
                                                    <div className="text-slate-400">Date: ________________________</div>
                                                </div>
                                            </div>
                                            <div className="space-y-12 flex flex-col justify-between">
                                                <p className="text-slate-700 font-bold font-sans">Prepared &amp; Submitted by:</p>
                                                <div className="border-t border-slate-300 pt-2 text-[10px] space-y-0.5">
                                                    <div className="font-bold text-slate-900 font-sans">{preparedBy}</div>
                                                    <div className="text-slate-500">Principal Consultant &amp; Strategist, Kolthoff Consulting</div>
                                                    <div className="text-slate-400">Date: {quoteDate}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* FORMULA MODAL POPUP */}
                        {isFormulaModalOpen && (
                            <div className="fixed inset-0 bg-brandNavy-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
                                <div className="bg-brandNavy-900 border border-brandNavy-700 max-w-xl w-full rounded-xl p-6 sm:p-8 space-y-6 shadow-2xl relative animate-fade-in text-slate-300">
                                    <button 
                                        onClick={() => setIsFormulaModalOpen(false)} 
                                        className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"
                                        aria-label="Close modal"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                    
                                    <div className="space-y-2">
                                        <span className="text-xs font-mono font-extrabold tracking-widest text-brandTeal-400 uppercase">Operational Leakage Model</span>
                                        <h3 className="text-xl font-serif font-black text-white">How We Audit Your "Chaos Tax"</h3>
                                    </div>

                                    <div className="p-4 bg-brandNavy-950 border border-brandNavy-700 rounded-lg overflow-x-auto text-center" id="modal-math-roi">
                                        <p className="text-sm font-mono leading-relaxed text-slate-100 mb-2">Mathematical Core Model:</p>
                                        <div className="text-brandTeal-400 text-sm overflow-x-auto py-2">
                                            {"\\[\\text{Annual Operational Leakage (Chaos Tax)} = \\text{Staff Count} \\times \\text{Avg Monthly Salary} \\times 12 \\times \\frac{\\text{Daily Lost Hours}}{8}\\]"}
                                        </div>
                                    </div>

                                    <div className="space-y-3 text-xs leading-relaxed font-sans font-medium text-slate-300">
                                        <p><strong className="text-white">Staff Count:</strong> Total headcount directly involved in workflows, coordination, and administration.</p>
                                        <p><strong className="text-white">Avg Monthly Salary:</strong> Average base salary plus statutory benefits (13th month, SSS, PhilHealth, Pag-IBIG).</p>
                                        <p><strong className="text-white">Daily Lost Hours:</strong> The estimated hours spent daily on administrative coordination drag (e.g., chasing updates on Viber, resolving Excel mismatches, and rectifying unwritten operational procedures).</p>
                                        <p className="text-slate-500 italic">This formula captures the direct opportunity cost of unoptimized administration, allowing us to align your SOW to reclaim high-value payroll capacity.</p>
                                    </div>

                                    <div className="pt-4 border-t border-brandNavy-700 flex justify-end">
                                        <button 
                                            onClick={() => setIsFormulaModalOpen(false)} 
                                            className="px-6 py-2 bg-brandTeal-500 hover:bg-brandTeal-600 text-white font-extrabold text-xs uppercase tracking-wider rounded"
                                        >
                                            Got it, Close
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // RENDER DOM VIRTUALLY
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
