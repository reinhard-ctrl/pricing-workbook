        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-brandBlue-400 shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const IconPrint = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;

        const INITIAL_TASKS = [
            { id: 'diag-1', category: '1. Operational Diagnostics', deliverable: 'Preparation & Onboarding', description: 'Client kickoff meeting, data security brief, and initial corporate baseline data acquisition.', minHours: 3, maxHours: 4, rate: 2500, selected: true },
            { id: 'diag-2', category: '1. Operational Diagnostics', deliverable: 'Stakeholder Discovery', description: 'Friction-Adjusted discovery loop (structured interviews with 4-6 key leadership roles, accounts, and desk operators).', minHours: 8, maxHours: 12, rate: 2500, selected: true },
            { id: 'diag-3', category: '1. Operational Diagnostics', deliverable: 'On-Site Observation Audit', description: 'Two continuous days of in-person workflow shadowing, step-timing, and bottleneck mapping.', minHours: 16, maxHours: 20, rate: 2500, selected: true },
            { id: 'diag-4', category: '1. Operational Diagnostics', deliverable: 'Forensic Systemic Audit', description: 'Compliance gap review (DOLE liability exposures) & technology subscription license audit.', minHours: 8, maxHours: 12, rate: 2500, selected: true },
            { id: 'diag-5', category: '1. Operational Diagnostics', deliverable: 'Risk Matrix Formulation', description: 'Synthesis of raw observation data into a highly prioritized B2B Operational Risk Matrix.', minHours: 5, maxHours: 8, rate: 2500, selected: true },
            { id: 'diag-6', category: '1. Operational Diagnostics', deliverable: 'Debrief & Roadmap Handover', description: 'Boardroom-ready presentation of audit discoveries, immediate quick wins, and strategic options.', minHours: 4, maxHours: 6, rate: 2500, selected: true },
            { id: 'sop-1', category: '2. Scale-Ready SOPs & HR', deliverable: 'Role Inventory & Scope Map', description: 'Systematic inventory of current state boundaries, functional responsibilities, and structural loops.', minHours: 10, maxHours: 15, rate: 2500, selected: false },
            { id: 'sop-2', category: '2. Scale-Ready SOPs & HR', deliverable: 'Swimlane Process Mapping', description: 'Friction-Adjusted mapping of high-fidelity, cross-functional swimlane diagrams (up to 5 core business workflows).', minHours: 45, maxHours: 55, rate: 2500, selected: false },
            { id: 'sop-3', category: '2. Scale-Ready SOPs & HR', deliverable: 'HR Templates & Compliance', description: 'Reviewing local contract standards, drafting standard employment templates and onboarding forms.', minHours: 15, maxHours: 25, rate: 2500, selected: false },
            { id: 'sop-4', category: '2. Scale-Ready SOPs & HR', deliverable: 'Employee Handbook Assembly', description: 'Friction-Adjusted compilation of compliant behavioral rules, leaves, local benefits, and code of conduct manuals.', minHours: 20, maxHours: 30, rate: 2500, selected: false },
            { id: 'sop-5', category: '2. Scale-Ready SOPs & HR', deliverable: 'Operations Playbook Launch', description: 'Indexing, publishing, and organizing digital documentation ready for internal training deployment.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'sop-6', category: '2. Scale-Ready SOPs & HR', deliverable: 'Handover & Training Workshops', description: 'Interactive leadership alignment workshops to secure swift corporate adoption.', minHours: 5, maxHours: 8, rate: 2500, selected: false },
            { id: 'trans-1', category: '3. 90-Day Transformation Sprint', deliverable: 'Value Stream Mapping (VSM)', description: 'Hosting dedicated value stream workshops to expose administrative and operational waste.', minHours: 20, maxHours: 30, rate: 2500, selected: false },
            { id: 'trans-2', category: '3. 90-Day Transformation Sprint', deliverable: 'Waste & Backlog Elimination', description: 'Conducting target sprints focusing on reducing administrative waste and re-routing slow paths.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'trans-3', category: '3. 90-Day Transformation Sprint', deliverable: 'Core Metric & KPI Tuning', description: 'Re-engineering custom, clean key performance indicators across major organizational divisions.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'trans-4', category: '3. 90-Day Transformation Sprint', deliverable: 'Process Re-engineering', description: 'Complete hands-on overhaul of slow processing steps, documents, routing tools, and integrations.', minHours: 40, maxHours: 50, rate: 2500, selected: false },
            { id: 'trans-5', category: '3. 90-Day Transformation Sprint', deliverable: 'Implementation Coaching', description: 'Side-by-side coaching alongside process champions to manage team friction during rollouts.', minHours: 50, maxHours: 60, rate: 2500, selected: false },
            { id: 'trans-6', category: '3. 90-Day Transformation Sprint', deliverable: 'Dashboard Integration', description: 'Friction-Adjusted setup of Visually automated, live tracking metrics and dashboards for leadership review.', minHours: 25, maxHours: 35, rate: 2500, selected: false },
            { id: 'coo-1', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'Operations Alignment Meetings', description: 'Directing weekly leadership alignment loops, metrics tracking, and project accountability.', minHours: 6, maxHours: 8, rate: 2500, selected: false },
            { id: 'coo-2', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'KPI & OKR Metric Governance', description: 'Evaluating monthly departmental execution scores and managing core governance KPIs.', minHours: 8, maxHours: 10, rate: 2500, selected: false },
            { id: 'coo-3', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'Continuous Optimization Sprints', description: 'Auditing ongoing processes to continue manual step reduction and automate workflows.', minHours: 8, maxHours: 10, rate: 2500, selected: false },
            { id: 'coo-4', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'High-Level C-Suite Advisory', description: 'Direct, on-demand executive consulting, labor compliance advisory, and long-term scaling strategy.', minHours: 4, maxHours: 6, rate: 2500, selected: false }
        ];

        function App() {
            const [tasks, setTasks] = useState(INITIAL_TASKS);
            const [globalRate, setGlobalRate] = useState(2500);
            const [copied, setCopied] = useState(false);
            const [activePreset, setActivePreset] = useState('diagnostics'); 
            
            // View Switcher state
            const [activeView, setActiveView] = useState('sandbox'); // 'sandbox' | 'quotation'

            // Client Quotation form states
            const [clientCompany, setClientCompany] = useState('Acme Corporation PH');
            const [clientRep, setClientRep] = useState('Juan dela Cruz');
            const [quoteId, setQuoteId] = useState('KC-2026-4402');
            const [quoteDate, setQuoteDate] = useState('June 1, 2026');
            const [quoteValidity, setQuoteValidity] = useState('30 Days');

            // Strategic Adjustments State Variables (From PH Audit File)
            const [frictionBuffer, setFrictionBuffer] = useState(15); // Friction and Hirit Buffer slider (+0% to +30%)
            const [delegatePercent, setDelegatePercent] = useState(60); // % of hours delegated to Associates (Cost: ₱350/hr) vs Principal (₱1,500/hr)
            
            const [newTaskCategory, setNewTaskCategory] = useState('1. Operational Diagnostics');
            const [newTaskDeliv, setNewTaskDeliv] = useState('');
            const [newTaskDesc, setNewTaskDesc] = useState('');
            const [newTaskMin, setNewTaskMin] = useState(5);
            const [newTaskMax, setNewTaskMax] = useState(10);

            const handleSelectPackage = (packageName) => {
                setActivePreset(packageName); 
                setTasks(prev => prev.map(t => {
                    let isSelected = false;
                    if (packageName === 'diagnostics' && t.category.includes('1. Operational Diagnostics')) isSelected = true;
                    else if (packageName === 'sop' && t.category.includes('2. Scale-Ready SOPs')) isSelected = true;
                    else if (packageName === 'transformation' && t.category.includes('3. 90-Day Transformation')) isSelected = true;
                    else if (packageName === 'coo' && t.category.includes('4. Fractional COO')) isSelected = true;
                    else if (packageName === 'all') isSelected = true;
                    return { ...t, selected: isSelected };
                }));
            };

            const applyGlobalRate = (rate) => {
                setGlobalRate(rate);
                setTasks(prev => prev.map(t => ({ ...t, rate: rate })));
            };

            const toggleTask = (id) => {
                setActivePreset('custom'); 
                setTasks(prev => prev.map(t => t.id === id ? { ...t, selected: !t.selected } : t));
            };

            const updateTaskField = (id, field, value) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, [field]: Number(value) } : t));
            };

            const addNewTask = (e) => {
                e.preventDefault();
                if (!newTaskDeliv) return;
                setActivePreset('custom');
                
                const newTask = {
                    id: `custom-${Date.now()}`,
                    category: newTaskCategory,
                    deliverable: newTaskDeliv,
                    description: newTaskDesc || 'Bespoke client scope requirement.',
                    minHours: Number(newTaskMin),
                    maxHours: Number(newTaskMax),
                    rate: globalRate,
                    selected: true
                };

                setTasks(prev => [...prev, newTask]);
                setNewTaskDeliv('');
                setNewTaskDesc('');
            };

            const removeTask = (id) => {
                setTasks(prev => prev.filter(t => t.id !== id));
            };

            // Enhanced Summary Calculation Block factoring in PH Friction & Resource Delegation Mix
            const summary = useMemo(() => {
                const selectedTasks = tasks.filter(t => t.selected);
                const minHoursTotal = selectedTasks.reduce((acc, curr) => acc + curr.minHours, 0);
                const maxHoursTotal = selectedTasks.reduce((acc, curr) => acc + curr.maxHours, 0);
                
                // 1. Friction & Hirit Buffer Multiplier
                const bufferMultiplier = 1 + (frictionBuffer / 100);
                const minHours = Math.round(minHoursTotal * bufferMultiplier);
                const maxHours = Math.round(maxHoursTotal * bufferMultiplier);
                
                // Dynamic client-facing project values with buffer integration
                const minCost = Math.round(selectedTasks.reduce((acc, curr) => acc + (curr.minHours * curr.rate), 0) * bufferMultiplier);
                const maxCost = Math.round(selectedTasks.reduce((acc, curr) => acc + (curr.maxHours * curr.rate), 0) * bufferMultiplier);
                
                // 2. Junior-Senior Delivery Leverage Calculations
                const assocRate = 350;      // Junior Associate Cost/Hr
                const principalRate = 1500;  // Your partner execution value/Hr
                
                const assocRatio = delegatePercent / 100;
                const principalRatio = 1 - assocRatio;
                
                // Estimated real cost to execute (deliver) based on hourly split
                const minInternalCost = Math.round((minHours * assocRatio * assocRate) + (minHours * principalRatio * principalRate));
                const maxInternalCost = Math.round((maxHours * assocRatio * assocRate) + (maxHours * principalRatio * principalRate));
                
                // Profit margin parameters
                const minNetProfit = minCost - minInternalCost;
                const maxNetProfit = maxCost - maxInternalCost;
                const profitMarginPercent = minCost > 0 ? Math.round((minNetProfit / minCost) * 100) : 0;
                
                return {
                    count: selectedTasks.length,
                    rawMinHours: minHoursTotal,
                    rawMaxHours: maxHoursTotal,
                    minHours,
                    maxHours,
                    minCost,
                    maxCost,
                    minInternalCost,
                    maxInternalCost,
                    minNetProfit,
                    maxNetProfit,
                    profitMarginPercent
                };
            }, [tasks, frictionBuffer, delegatePercent]);

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val);
            };

            const proposalSummaryText = useMemo(() => {
                const activeOnes = tasks.filter(t => t.selected);
                let output = `### PROPOSAL ESTIMATE SUMMARY - KOLTHOFF CONSULTING\n`;
                output += `* **Total Selected Tasks**: ${summary.count}\n`;
                output += `* **Scoping Hours (Buffered)**: ${summary.minHours} - ${summary.maxHours} Target Hours\n`;
                output += `* **Friction & Hirit Safety Buffer**: +${frictionBuffer}%\n`;
                output += `* **Total Estimated Investment**: ${formatCurrency(summary.minCost)} to ${formatCurrency(summary.maxCost)} (PHP Ex-Tax)\n\n`;
                output += `#### SCOPE OF INCLUDED WORK ITEMS:\n`;
                
                let currentCat = '';
                activeOnes.forEach(t => {
                    if (t.category !== currentCat) {
                        currentCat = t.category;
                        output += `\n**${currentCat.toUpperCase()}**\n`;
                    }
                    output += `- [x] **${t.deliverable}**: ${t.description} (Approx. ${Math.round(t.minHours * (1 + frictionBuffer/100))}-${Math.round(t.maxHours * (1 + frictionBuffer/100))} hrs)\n`;
                });
                return output;
            }, [tasks, summary, frictionBuffer]);

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = proposalSummaryText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const handlePrint = () => {
                window.print();
            };

            return (
                <div class="font-sans min-h-screen">
                    {/* Aligned Internal Executive Header (hidden when printing) */}
                    <header class="border-b border-brandNavy-700 bg-brandNavy-900/90 backdrop-blur-md sticky top-0 z-50 no-print">
                        <div class="max-w-[1600px] mx-auto px-6 sm:px-8 h-24 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <IconWebsiteLogo className="w-12 h-12 text-brandBlue-400" />
                                <div>
                                    <span class="font-sans font-extrabold tracking-wider text-xl uppercase block text-slate-100">
                                        KOLTHOFF <span class="text-brandBlue-400">CONSULTING</span>
                                    </span>
                                    <span class="text-[10px] text-brandBlue-400 font-mono tracking-[0.25em] uppercase block -mt-1 font-bold">Internal Partner Operations Portal</span>
                                </div>
                            </div>
                            
                            {/* Internal Navigation links */}
                            <nav class="hidden lg:flex items-center gap-8 text-sm font-medium tracking-wide">

                            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8 items-start">
                                
                                {/* Left Side: Quote Configuration Editor Panel (hidden when printing) */}
                                <div class="xl:col-span-4 bg-brandNavy-900 border border-brandNavy-700 rounded-xl p-6 shadow-2xl backdrop-blur-sm no-print space-y-5">
                                    <h3 class="text-sm font-bold tracking-wider text-brandBlue-400 uppercase font-mono flex items-center gap-2">
                                        <IconEdit /> Customize Quotation Fields
                                    </h3>
                                    <p class="text-xs text-slate-400 leading-relaxed">
                                        Changes made to the parameters below will dynamically adjust and format the printable proposal stationary sheet on the right in real time.
                                    </p>

                                    <div class="space-y-4">
                                        <div>
                                            <label class="text-[10px] font-mono text-slate-400 uppercase block mb-1">Client Company Name</label>
                                            <input 
                                                type="text" 
                                                value={clientCompany} 
                                                onChange={(e) => setClientCompany(e.target.value)}
                                                class="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500"
                                            />
                                        </div>
                                        <div>
                                            <label class="text-[10px] font-mono text-slate-400 uppercase block mb-1">Client Representative</label>
                                            <input 
                                                type="text" 
                                                value={clientRep} 
                                                onChange={(e) => setClientRep(e.target.value)}
                                                class="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500"
                                            />
                                        </div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div>
                                                <label class="text-[10px] font-mono text-slate-400 uppercase block mb-1">Quote ID Reference</label>
                                                <input 
                                                    type="text" 
                                                    value={quoteId} 
                                                    onChange={(e) => setQuoteId(e.target.value)}
                                                    class="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500 font-mono"
                                                />
                                            </div>
                                            <div>
                                                <label class="text-[10px] font-mono text-slate-400 uppercase block mb-1">Quote Date</label>
                                                <input 
                                                    type="text" 
                                                    value={quoteDate} 
                                                    onChange={(e) => setQuoteDate(e.target.value)}
                                                    class="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500"
                                                />
                                            </div>
                                        </div>
                                        <div>
                                            <label class="text-[10px] font-mono text-slate-400 uppercase block mb-1">Proposal Validity</label>
                                            <input 
                                                type="text" 
                                                value={quoteValidity} 
                                                onChange={(e) => setQuoteValidity(e.target.value)}
                                                class="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500"
                                            />
                                        </div>
                                    </div>

                                    {/* Action Printing Module */}
                                    <div class="pt-4 border-t border-brandNavy-700">
                                        <button
                                            onClick={handlePrint}
                                            class="w-full py-3 bg-brandBlue-500 hover:bg-brandBlue-400 text-slate-950 font-bold rounded-lg text-xs uppercase tracking-wider flex items-center justify-center transition-all shadow-lg shadow-brandBlue-950/20"
                                        >
                                            <IconPrint /> Print or Save as PDF
                                        </button>
                                        <p class="text-[10px] text-slate-500 leading-relaxed text-center mt-3">
                                            Make sure to select <strong class="text-slate-400">Save as PDF</strong> inside your browser print dialog. Toggle background graphics on to secure brand colors.
                                        </p>
                                    </div>
                                </div>

                                {/* Right Side: Formal B2B Quotation Stationery Sheet */}
                                <div class="xl:col-span-8 bg-white text-slate-900 border border-slate-200 rounded-xl p-8 sm:p-12 shadow-2xl print-card">
                                    
                                    {/* Document Header (Matched Website Branding) */}
                                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-8 border-b-2 border-brandBlue-500 mb-8 print-card-header gap-6">
                                        <div class="flex items-center gap-4">
                                            <div class="w-14 h-14 bg-gradient-to-tr from-brandBlue-700 to-brandBlue-500 rounded flex items-center justify-center shrink-0">
                                                {/* Printable Unified SVG Logo */}
                                                <IconWebsiteLogo className="w-10 h-10 text-white" />
                                            </div>
                                            <div>
                                                <h1 class="font-sans font-black tracking-wider text-xl uppercase text-slate-900 leading-none">
                                                    KOLTHOFF <span class="text-brandBlue-600 print-accent">CONSULTING</span>
                                                </h1>
                                                <span class="text-[9px] text-slate-500 tracking-widest uppercase block mt-1 font-mono font-bold">Operational Architecture & Strategy</span>
                                            </div>
                                        </div>
                                        <div class="text-left sm:text-right font-mono text-[11px] text-slate-600 space-y-1">
                                            <div class="text-slate-900 font-bold text-sm tracking-wide">OFFICIAL QUOTATION</div>
                                            <div>Reference: <span class="font-bold text-slate-950">{quoteId}</span></div>
                                            <div>Date Issued: {quoteDate}</div>
                                            <div>Validity: {quoteValidity}</div>
                                        </div>
                                    </div>

                                    {/* Sender vs Recipient metadata */}
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8 text-sm">
                                        <div class="space-y-1.5">
                                            <span class="text-[10px] font-mono uppercase tracking-wider text-slate-400 block font-bold">Prepared For:</span>
                                            <div class="font-bold text-slate-950 text-base">{clientRep}</div>
                                            <div class="text-slate-700 font-semibold">{clientCompany}</div>
                                            <div class="text-xs text-slate-500">Republic of the Philippines</div>
                                        </div>
                                        <div class="space-y-1.5 md:text-right">
                                            <span class="text-[10px] font-mono uppercase tracking-wider text-slate-400 block font-bold">Prepared By:</span>
                                            <div class="font-bold text-slate-950 text-base">Kolthoff Consulting Partner Portal</div>
                                            <div class="text-slate-700">Operations & Logistics Advisory</div>
                                            <div class="text-xs text-slate-500">Manila, Philippines | contact@kolthoff-consulting.com</div>
                                        </div>
                                    </div>

                                    <div class="text-xs text-slate-500 mb-6 italic leading-relaxed">
                                        We are pleased to submit our formal scope proposal and flat-rate pricing estimates for the operational and systemic optimization of your organization's workflows:
                                    </div>

                                    {/* Scope Itemized Table */}
                                    <div class="border border-slate-200 rounded-lg overflow-hidden mb-8 print-divider">
                                        <table class="w-full text-left border-collapse text-xs">
                                            <thead>
                                                <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 uppercase font-mono text-[9px] tracking-wider font-bold">
                                                    <th class="py-3 px-4 w-[25%]">Service Category</th>
                                                    <th class="py-3 px-4 w-[55%]">SOW Deliverables & Objectives</th>
                                                    <th class="py-3 px-4 text-center w-[10%]">Hours</th>
                                                    <th class="py-3 px-4 text-right w-[10%]">Base Range</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100">
                                                {tasks.filter(t => t.selected).map((task) => (
                                                    <tr key={task.id} class="hover:bg-slate-50/50">
                                                        <td class="py-3 px-4 align-top font-bold text-slate-700 text-[10px]">
                                                            {task.category.replace(/^\d+\.\s/, '')}
                                                        </td>
                                                        <td class="py-3 px-4 align-top">
                                                            <div class="font-bold text-slate-900">{task.deliverable}</div>
                                                            <div class="text-[10px] text-slate-500 mt-0.5 leading-relaxed">{task.description}</div>
                                                        </td>
                                                        <td class="py-3 px-4 align-top text-center font-mono text-slate-700">
                                                            {Math.round(task.minHours * (1 + frictionBuffer/100))} - {Math.round(task.maxHours * (1 + frictionBuffer/100))}
                                                        </td>
                                                        <td class="py-3 px-4 align-top text-right font-mono font-bold text-slate-900 whitespace-nowrap">
                                                            {formatCurrency(task.minHours * task.rate)} - {formatCurrency(task.maxHours * task.rate)}
                                                        </td>
                                                    </tr>
                                                ))}
                                                {tasks.filter(t => t.selected).length === 0 && (
                                                    <tr>
                                                        <td colspan="4" class="py-8 px-4 text-center text-slate-400 italic">No project deliverables currently selected. Return to Sandbox to build your SOW.</td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* Subtotal and Grand Valuation Sheet */}
                                    <div class="flex flex-col sm:flex-row sm:justify-between items-end gap-6 py-6 border-t border-b border-slate-200 mb-8 print-divider text-sm">
                                        <div class="text-xs text-slate-500 max-w-md leading-relaxed text-left">
                                            <strong class="text-slate-700 block mb-1">PH Market Safety & Scope Buffer Notice:</strong>
                                            Pricing reflects a configured <strong>+{frictionBuffer}% local friction buffer</strong> ensuring zero delivery scope-creep modifications or billing recalculations during active sprint lifecycles.
                                        </div>
                                        <div class="text-right space-y-1.5 shrink-0 min-w-[250px]">
                                            <div class="flex justify-between items-center text-slate-600 font-mono text-xs">
                                                <span>Scoping Hours (Buffered):</span>
                                                <span class="font-bold text-slate-900">{summary.minHours} - {summary.maxHours} Target Hrs</span>
                                            </div>
                                            <div class="flex justify-between items-center text-slate-600 font-mono text-xs pb-1.5 border-b border-slate-100">
                                                <span>Friction Add-on Rate:</span>
                                                <span>+{frictionBuffer}%</span>
                                            </div>
                                            <div class="flex justify-between items-center text-base font-bold text-slate-900 pt-1">
                                                <span>Calculated Fee Range:</span>
                                                <span class="text-brandBlue-600 print-accent text-lg font-serif">
                                                    {formatCurrency(summary.minCost)} – {formatCurrency(summary.maxCost)}
                                                </span>
                                            </div>
                                            <p class="text-[9px] text-slate-400 block italic">Total net flat-fee range. Excludes standard local VAT.</p>
                                        </div>
                                    </div>

                                    {/* Milestone Billing Grid */}
                                    <div class="mb-8">
                                        <h4 class="text-[10px] font-mono uppercase tracking-wider text-slate-400 font-bold mb-3">Structured Billing Milestones (30-40-30 schedule)</h4>
                                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs font-sans">
                                            <div class="p-3 bg-slate-50 rounded border border-slate-200">
                                                <div class="font-bold text-slate-800">1. Kickoff Mobilization (30%)</div>
                                                <span class="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">
                                                    {formatCurrency(summary.minCost * 0.3)} - {formatCurrency(summary.maxCost * 0.3)}
                                                </span>
                                            </div>
                                            <div class="p-3 bg-slate-50 rounded border border-slate-200">
                                                <div class="font-bold text-slate-800">2. Mid-point SOP Handover (40%)</div>
                                                <span class="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">
                                                    {formatCurrency(summary.minCost * 0.4)} - {formatCurrency(summary.maxCost * 0.4)}
                                                </span>
                                            </div>
                                            <div class="p-3 bg-slate-50 rounded border border-slate-200">
                                                <div class="font-bold text-slate-800">3. Handover & Live Launch (30%)</div>
                                                <span class="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">
                                                    {formatCurrency(summary.minCost * 0.3)} - {formatCurrency(summary.maxCost * 0.3)}
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Terms and Conditions Section */}
                                    <div class="text-[9px] text-slate-500 space-y-2 pb-6 border-b border-slate-200 mb-8 print-divider leading-relaxed">
                                        <strong class="text-slate-700 block text-[10px] uppercase font-mono">Standard Professional Terms</strong>
                                        <p>1. <strong>Confidentiality / NDA:</strong> Kolthoff Consulting guarantees full structural safety and non-disclosure of internal files, accounts registries, and process metrics.</p>
                                        <p>2. <strong>Delivery Guardrail:</strong> Project scopes are fixed on signature kickoff. Sub-task additions outside this SOW block are billed as separate modular contract addenda.</p>
                                        <p>3. <strong>Payment Terms & Bank Details:</strong> Invoices are issued at milestone handovers. Payments are expected within seven (7) calendar business days of invoice receipt via direct bank transfer to:</p>
                                        <div class="ml-4 pl-3 border-l-2 border-brandBlue-500 font-mono text-[9px] text-slate-700 space-y-0.5 bg-slate-50 py-1.5 rounded">
                                            <div>Bank Name: <strong>BDO Unibank Inc.</strong></div>
                                            <div>Account Name: <strong>Reinhard Ludwig A. Kolthoff</strong></div>
                                            <div>Account Number: <strong>0039 5019 0761</strong></div>
                                        </div>
                                    </div>

                                    {/* Sign-off Agreement Blocks */}
                                    <div class="pt-8 text-xs">
                                        <div class="grid grid-cols-2 gap-12 sm:gap-24">
                                            <div class="space-y-12">
                                                <p class="text-slate-600 font-medium">Approved and Accepted by:</p>
                                                <div class="border-t border-slate-300 pt-2 text-[10px] space-y-0.5">
                                                    <div class="font-bold text-slate-900">{clientRep}</div>
                                                    <div class="text-slate-500">Representative, {clientCompany}</div>
                                                    <div class="text-slate-400">Date: ________________________</div>
                                                </div>
                                            </div>
                                            <div class="space-y-12">
                                                <p class="text-slate-600 font-medium">Submitted by:</p>
                                                <div class="border-t border-slate-300 pt-2 text-[10px] space-y-0.5">
                                                    <div class="font-bold text-slate-900 font-sans">Kolthoff Consulting Partner</div>
                                                    <div class="text-slate-500">Operational Architecture Practice</div>
                                                    <div class="text-slate-400">Date: {quoteDate}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render the React components inside the virtual DOM mount standard
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
