                                        <p>3. <strong>Professional Compensation, Taxes, and Late Payments:</strong> Total professional fees are ex-VAT. All invoices are billed in Philippine Pesos (PHP) per the Milestone Billing Schedule. Payment must be cleared within seven (7) business days from the invoice date. Late payments will incur a financing charge of 1.5% per month on outstanding balances.</p>

                                        <p>6. <strong>Cancellation & Work-in-Progress (WIP) Billing:</strong> Either party may terminate this agreement with fifteen (15) days written notice. In the event of early termination, the Client agrees to pay for all work-in-progress, completed milestones, and hours logged up to the effective termination date.</p>
                                        <p>7. <strong>Dispute Resolution & Jurisdiction:</strong> Any disputes arising from this contract shall be settled amicably through good-faith arbitration in Metro Manila, Philippines. Unresolved disputes shall fall under the exclusive jurisdiction of the courts of Taytay, Rizal, Calabarzon.</p>
