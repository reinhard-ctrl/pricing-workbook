            // Main Router State: 'sandbox' (Internal Calculator) | 'proposal' (Internal SOW) | 'quotation' (Internal Invoice)
            const [view, setView] = useState('sandbox');

            // Internal Scoping Workbench State List
            const [tasks, setTasks] = useState(INITIAL_TASKS);
            const [globalRate, setGlobalRate] = useState(2500);
            const [copied, setCopied] = useState(false);
            const [activePresets, setActivePresets] = useState(['diagnostics']);
            const [projectTimeline, setProjectTimeline] = useState("1 - 2 Weeks");

            // Client and Quote Customization Metadata
            const [clientCompany, setClientCompany] = useState('Acme Corporation PH');
            const [clientRep, setClientRep] = useState('Juan dela Cruz');
            const [quoteId, setQuoteId] = useState('KC-2026-4402');
            const [quoteDate, setQuoteDate] = useState('June 1, 2026');
            const [quoteValidity, setQuoteValidity] = useState('30 Days');
            const [annualInactionCost, setAnnualInactionCost] = useState(1200000);
            const [includeTax, setIncludeTax] = useState(false); // Philippine 12% Corporate VAT Toggle

            // Partner Customization States (Ludwig Calibration)
            const [preparedBy, setPreparedBy] = useState('Reinhard Ludwig A. Kolthoff');
            const [preparerTitle, setPreparerTitle] = useState('Principal Consultant');
            const [targetStartDate, setTargetStartDate] = useState('July 1, 2026');

            // Scope Proposal (SOW) Custom Text Blocks
            const [proposalObjectives, setProposalObjectives] = useState('Build clean process architecture, mitigate regulatory labor compliance risks, and establish scalable workflows to support regional SME expansion.');
            const [proposalSponsor, setProposalSponsor] = useState('Chief Operating Officer / VP of Human Resources');
            const [clientPrereqs, setClientPrereqs] = useState('Provision of current organization charts, raw HR registers, active software inventory, and scheduled stakeholder access block.');
            
            const [preDiagnosticList, setPreDiagnosticList] = useState(
                "• Current Organizational Chart (existing structural hierarchies & operational divisions)\n" +
                "• Process Documents (any previous flowcharts, checklists, templates, or manuals)\n" +
                "• Human Resources Baseline (active payroll registries, standard contract templates, and active employee handbook)\n" +
                "• Technical Infrastructure Map (inventory of software licenses, user seats, and database systems)\n" +
                "• Representative Operational Reports (sample daily/weekly logs, billing sheets, and client onboarding forms)"
            );

            // Strategic PH Buffers
            const [frictionBuffer, setFrictionBuffer] = useState(15); // +0% to +30% Buffer 
            const [delegatePercent, setDelegatePercent] = useState(60); // % of Associate (₱350/hr) vs Principal (₱1,500/hr)

            const [newTaskCategory, setNewTaskCategory] = useState('1. Operational Diagnostics');
            const [newTaskDeliv, setNewTaskDeliv] = useState('');
            const [newTaskDesc, setNewTaskDesc] = useState('');
            const [newTaskHours, setNewTaskHours] = useState(12);
            
            // New Advanced Custom Scoping Particular fields
            const [newTaskActivities, setNewTaskActivities] = useState('');
            const [newTaskExpectations, setNewTaskExpectations] = useState('');
            const [newTaskOutput, setNewTaskOutput] = useState('');

            // Dynamic Timeline Auto-Adjust Logic
            const calculateTimeline = (presets) => {
                if (presets.includes('coo') || presets.includes('msp')) {
                    return "Ongoing (Monthly Retainer)";
                }
                if (presets.includes('transformation')) {
                    return "12 Weeks (90 Days)";
                }
                let count = presets.length;
                if (count === 0) return "N/A";
                if (count === 1) {
                    if (presets.includes('diagnostics')) return "1 - 2 Weeks";
                    if (presets.includes('sop')) return "4 - 6 Weeks";
                    if (presets.includes('lark')) return "2 - 3 Weeks";
                    if (presets.includes('pm')) return "3 - 4 Weeks";
                }
                if (count <= 3) return "6 - 8 Weeks";
                return "12 - 16 Weeks";
            };

            const handleTogglePreset = (presetName) => {
                let updatedPresets = activePresets.includes(presetName) 
                    ? activePresets.filter(p => p !== presetName) 
                    : [...activePresets, presetName];
                
                setActivePresets(updatedPresets);
                setProjectTimeline(calculateTimeline(updatedPresets));

                setTasks(prev => prev.map(t => {
                    let matchesAnyActive = false;
                    if (updatedPresets.includes('diagnostics') && t.category.includes('1. Operational Diagnostics')) matchesAnyActive = true;
                    if (updatedPresets.includes('sop') && t.category.includes('2. Scale-Ready SOPs')) matchesAnyActive = true;
                    if (updatedPresets.includes('transformation') && t.category.includes('3. 90-Day Transformation')) matchesAnyActive = true;
                    if (updatedPresets.includes('coo') && t.category.includes('4. Fractional COO')) matchesAnyActive = true;
                    if (updatedPresets.includes('lark') && t.category.includes('5. Lark Suite')) matchesAnyActive = true;
                    if (updatedPresets.includes('pm') && t.category.includes('6. Project Management Training')) matchesAnyActive = true;
                    if (updatedPresets.includes('msp') && t.category.includes('7. Managed Service Provider')) matchesAnyActive = true;
                    
                    return { ...t, selected: matchesAnyActive };
                }));
            };

            const handleSelectAllPresets = () => {
                const all = ['diagnostics', 'sop', 'transformation', 'coo', 'lark', 'pm', 'msp'];
                setActivePresets(all);
                setProjectTimeline("16 Weeks");
                setTasks(prev => prev.map(t => ({ ...t, selected: true })));
            };

            const handleClearAllPresets = () => {
                setActivePresets([]);
                setProjectTimeline("N/A");
                setTasks(prev => prev.map(t => ({ ...t, selected: false })));
            };

            const applyGlobalRate = (rate) => {
                setGlobalRate(rate);
                setTasks(prev => prev.map(t => ({ ...t, rate: rate })));
            };

            const toggleTask = (id) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, selected: !t.selected } : t));
            };

            const updateTaskField = (id, field, value) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, [field]: Number(value) } : t));
            };

            const addNewTask = (e) => {
                e.preventDefault();
                if (!newTaskDeliv) return;
                
                const newTask = {
                    id: `custom-${Date.now()}`,
                    category: newTaskCategory,
                    deliverable: newTaskDeliv,
                    description: newTaskDesc || 'Bespoke client scope requirement.',
                    estHours: Number(newTaskHours),
                    rate: globalRate,
                    selected: true,
                    isMonthlyRetainer: newTaskCategory.includes('COO') || newTaskCategory.includes('MSP'),
                    scopeDetails: {
                        activities: newTaskActivities || "Execute planned task steps and deliverable milestones in coordination with designated managers.",
                        expectations: newTaskExpectations || "Provide timely inputs, process data access, and constructive feedback on drafted materials.",
                        output: newTaskOutput || "Finished deliverable asset aligned with custom SOW scope specifications."
                    }
                };

                setTasks(prev => [...prev, newTask]);
                setNewTaskDeliv('');
                setNewTaskDesc('');
                setNewTaskActivities('');
                setNewTaskExpectations('');
                setNewTaskOutput('');
            };

            const removeTask = (id) => {
                setTasks(prev => prev.filter(t => t.id !== id));
            };

            // Workbench Scope Summary Calculations
            const summary = useMemo(() => {
                const selectedTasks = tasks.filter(t => t.selected);
                const estHoursTotal = selectedTasks.reduce((acc, curr) => acc + curr.estHours, 0);
                const bufferMultiplier = 1 + (frictionBuffer / 100);
                const estHours = Math.round(estHoursTotal * bufferMultiplier);
                const subtotalCost = Math.round(selectedTasks.reduce((acc, curr) => acc + (curr.estHours * curr.rate), 0) * bufferMultiplier);
                
                // Taxation Calculations (VAT)
                const taxRateMultiplier = 0.12;
                const taxValue = includeTax ? Math.round(subtotalCost * taxRateMultiplier) : 0;
                const totalCost = subtotalCost + taxValue;

                const assocRate = 350;
                const principalRate = 1500;
                const assocRatio = delegatePercent / 100;
                const principalRatio = 1 - assocRatio;
                
                const internalCost = Math.round((estHours * assocRatio * assocRate) + (estHours * principalRatio * principalRate));
                const netProfit = subtotalCost - internalCost;
                const profitMarginPercent = subtotalCost > 0 ? Math.round((netProfit / subtotalCost) * 100) : 0;
                
                const netFirstYearSavings = Math.max(0, annualInactionCost - totalCost);
                const projectROI = totalCost > 0 ? Math.round((netFirstYearSavings / totalCost) * 100) : 0;
                const isRetainerOnly = selectedTasks.length > 0 && selectedTasks.every(t => t.isMonthlyRetainer);

                return {
                    count: selectedTasks.length,
                    rawEstHours: estHoursTotal,
                    estHours,
                    subtotalCost,
                    taxValue,
                    totalCost,
                    internalCost,
                    netProfit,
                    profitMarginPercent,
                    netFirstYearSavings,
                    projectROI,
                    isRetainerOnly
                };
            }, [tasks, frictionBuffer, delegatePercent, annualInactionCost, includeTax]);

            const isUnder4Weeks = useMemo(() => {
                if (summary.isRetainerOnly) return false;
                const lowerTimeline = projectTimeline.toLowerCase();
                if (lowerTimeline.includes('monthly') || lowerTimeline.includes('ongoing')) return false;
                
                const matches = lowerTimeline.match(/(\d+)/g);
                if (matches) {
                    if (lowerTimeline.includes('week')) {
                        const weekMatch = lowerTimeline.match(/(\d+)\s*(?:-\s*(\d+))?\s*week/);
                        if (weekMatch) {
                            const num1 = parseInt(weekMatch[1], 10);
                            const num2 = weekMatch[2] ? parseInt(weekMatch[2], 10) : num1;
                            return Math.max(num1, num2) <= 4; 
                        }
                    }
                }
                return false;
            }, [projectTimeline, summary.isRetainerOnly]);

            // SOW Text Copy block
            const proposalSummaryText = useMemo(() => {
                const activeOnes = tasks.filter(t => t.selected);
                let output = `### PROPOSAL SUMMARY - KOLTHOFF CONSULTING\n`;
                output += `* **Total Selected Tasks**: ${summary.count}\n`;
                output += `* **Friction-Buffered Scope Effort**: ${summary.estHours} Estimated Hours\n`;
                output += `* **Estimated Project Timeline**: ${projectTimeline}\n`;
                output += `* **Total Project Investment**: ${formatCurrency(summary.totalCost)} (PHP ${includeTax ? 'Inc. 12% VAT' : 'Ex-Tax'})\n\n`;
                output += `#### SCOPE OF INCLUDED WORK ITEMS:\n`;
                
                let currentCat = '';
                activeOnes.forEach(t => {
                    if (t.category !== currentCat) {
                        currentCat = t.category;
                        output += `\n**${currentCat.toUpperCase()}**\n`;
                    }
                    output += `- [x] **${t.deliverable}**: ${t.description} (Approx. ${Math.round(t.estHours * (1 + frictionBuffer/100))} hrs)\n`;
                });
                return output;
            }, [tasks, summary, frictionBuffer, projectTimeline, includeTax]);

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = proposalSummaryText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const handlePrint = () => {
                window.print();
            };

            // Individual category selectors for SOW mapping
            const activeDiag = tasks.some(t => t.category.includes('1. Operational Diagnostics') && t.selected);
            const activeSOP = tasks.some(t => t.category.includes('2. Scale-Ready SOPs') && t.selected);
            const activeTrans = tasks.some(t => t.category.includes('3. 90-Day Transformation') && t.selected);
            const activeCOO = tasks.some(t => t.category.includes('4. Fractional COO') && t.selected);
            const activeLark = tasks.some(t => t.category.includes('5. Lark Suite') && t.selected);
            const activePM = tasks.some(t => t.category.includes('6. Project Management Training') && t.selected);
            const activeMSP = tasks.some(t => t.category.includes('7. Managed Service Provider') && t.selected);

            return (
                <div className="font-sans min-h-screen text-slate-300 bg-brandNavy-950">
                    
                    {/* Header: Displays dynamic options based on view (Standard vs Executive Portal) */}
                    <header className="border-b border-brandNavy-700/50 bg-brandNavy-950/95 sticky top-0 z-50 backdrop-blur-md no-print">
                        <div className="max-w-[1600px] mx-auto px-6 sm:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <IconWebsiteLogo className="w-10 h-10 text-brandBlue-400" />
                                <div>
                                    <span className="font-sans font-extrabold tracking-wider text-base sm:text-lg uppercase block text-white">
                                        KOLTHOFF <span className="text-brandBlue-400">CONSULTING</span>
                                    </span>
                                    <span className="text-[9px] text-brandBlue-400 font-mono tracking-[0.25em] uppercase block -mt-1 font-bold">
                                        Internal Partner Operations Portal
                                    </span>
                                </div>
                            </div>
                            
                            <nav className="flex items-center gap-4 sm:gap-6">
                                <button 
                                    onClick={() => setView('sandbox')} 
                                    className={`px-4 py-2 rounded font-mono text-[10px] uppercase font-bold border tracking-wider transition-all ${view === 'sandbox' ? 'bg-brandBlue-500 text-slate-905 border-brandBlue-500 font-extrabold' : 'bg-brandNavy-900 text-slate-300 border-brandNavy-750 hover:bg-brandNavy-800 font-bold'}`}
                                >
                                    1. Sandbox
                                </button>
                                <button 
                                    onClick={() => setView('proposal')} 
                                    className={`px-4 py-2 rounded font-mono text-[10px] uppercase font-bold border tracking-wider transition-all ${view === 'proposal' ? 'bg-brandBlue-500 text-slate-905 border-brandBlue-500 font-extrabold' : 'bg-brandNavy-900 text-slate-300 border-brandNavy-750 hover:bg-brandNavy-800 font-bold'}`}
                                >
                                    2. SOW Proposal
                                </button>
                                <button 
                                    onClick={() => setView('quotation')} 
                                    className={`px-4 py-2 rounded font-mono text-[10px] uppercase font-bold border tracking-wider transition-all ${view === 'quotation' ? 'bg-brandBlue-500 text-slate-905 border-brandBlue-500 font-extrabold' : 'bg-brandNavy-900 text-slate-300 border-brandNavy-750 hover:bg-brandNavy-800 font-bold'}`}
                                >
                                    3. Quote Sheet
                                </button>
                                <a 
                                    href="./index.html" 
                                    className="px-4 py-2 bg-brandNavy-950 border border-brandNavy-700 hover:border-brandNavy-600 rounded text-slate-300 text-[10px] font-bold uppercase tracking-wider font-mono"
                                >
                                    ◀ Public Website
                                </a>
                            </nav>
                        </div>
                    </header>

                    {/* INTERNAL PARTNER WORKSPACE */}
                    <div className="p-4 sm:p-6 lg:p-8 max-w-[1600px] mx-auto animate-fade-in">
                        
                        {/* VIEW 1: CONFIDENTIAL SANDBOX WORKBENCH */}
                        {view === 'sandbox' && (
                            <div className="no-print space-y-8">
                                {/* Parameter Settings Banner */}
                                <div className="bg-brandNavy-800/60 border border-brandNavy-700/80 rounded-xl p-5 flex flex-col md:flex-row items-center justify-between gap-6 shadow-xl">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2.5 rounded-lg bg-brandBlue-500/10 text-brandBlue-400 border border-brandBlue-500/20">
                                            <IconCalculator className="" />
                                        </div>
                                        <div>
                                            <h3 className="text-xs font-bold font-mono tracking-wider text-slate-400 uppercase">Consultant Billing Base</h3>
                                            <p className="text-xs text-slate-500 mt-0.5">Toggle rate basis between associate-led, senior-led, and principal executive frameworks.</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-center gap-6 w-full md:w-auto">
                                        {/* PH 12% Corporate VAT Toggle */}
                                        <div className="flex items-center gap-2.5 bg-brandNavy-950 border border-brandNavy-700 px-4 py-2 rounded-lg">
                                            <span className="text-[10px] font-mono tracking-wider uppercase text-slate-400 font-bold">Include 12% VAT</span>
                                            <button 
                                                onClick={() => setIncludeTax(!includeTax)}
                                                className={`w-10 h-6 flex items-center rounded-full p-0.5 transition-all duration-300 ${includeTax ? 'bg-brandBlue-500' : 'bg-brandNavy-800 border border-brandNavy-700'}`}
                                            >
                                                <span className={`w-5 h-5 rounded-full bg-white shadow-md transform transition-all duration-300 ${includeTax ? 'translate-x-4' : 'translate-x-0'}`} />
                                            </button>
                                        </div>

                                        <div className="w-full md:w-80 bg-brandNavy-950 p-4 rounded-lg border border-brandNavy-700">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-[10px] font-mono text-slate-400 uppercase">Hourly Base Rate</span>
                                                <span className="text-sm font-mono font-bold text-brandBlue-400">₱{globalRate.toLocaleString()} / hr</span>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="1000" 
                                                max="5000" 
                                                step="100"
                                                value={globalRate} 
                                                onChange={(e) => applyGlobalRate(Number(e.target.value))}
                                                className="w-full accent-brandBlue-400 bg-brandNavy-900 h-2 rounded-lg cursor-pointer"
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* Grid Setup */}
                                <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 items-start">
                                    {/* Left Deliverables Registry */}
                                    <div className="xl:col-span-9 bg-brandNavy-900/30 border border-brandNavy-700/80 rounded-xl overflow-hidden shadow-2xl backdrop-blur-sm">
                                        
                                        {/* Preset Controller Panel */}
                                        <div className="p-5 bg-brandNavy-950/80 border-b border-brandNavy-700/80 flex flex-col gap-4">
                                            <div className="flex items-center justify-between border-b border-brandNavy-700/50 pb-2">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-1.5 h-1.5 rounded-full bg-brandBlue-500 animate-pulse"></span>
                                                    <span className="text-xs font-mono tracking-wider text-slate-300 uppercase font-semibold">Contract Preset Profiles (Multi-Selection)</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={handleSelectAllPresets} className="px-2.5 py-1 text-[10px] font-bold rounded transition-all bg-slate-100 text-slate-950 hover:bg-brandBlue-500 hover:text-slate-950 font-sans">Select All</button>
                                                    <button onClick={handleClearAllPresets} className="px-2.5 py-1 text-[10px] font-bold rounded transition-all bg-brandNavy-900 text-slate-400 border border-brandNavy-700 hover:text-slate-200 font-sans">Clear All</button>
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-2">
                                                {[
                                                    { name: 'diagnostics', label: 'Diagnostics Audit' },
                                                    { name: 'sop', label: 'SOP Foundations' },
                                                    { name: 'transformation', label: '90-Day Sprint' },
                                                    { name: 'coo', label: 'Fractional COO' },
                                                    { name: 'lark', label: 'Lark Workspace' },
                                                    { name: 'pm', label: 'HERMES PM Training' },
                                                    { name: 'msp', label: 'Managed MSP' }
                                                ].map(preset => {
                                                    const isActive = activePresets.includes(preset.name);
                                                    return (
                                                        <button 
                                                            key={preset.name}
                                                            onClick={() => handleTogglePreset(preset.name)} 
                                                            className={`px-3.5 py-1.5 text-xs font-bold rounded transition-all flex items-center gap-1.5 ${isActive ? 'bg-brandBlue-500 text-slate-955 shadow-md font-extrabold border border-brandBlue-400' : 'bg-brandNavy-900 text-slate-300 border border-brandNavy-700 hover:bg-brandNavy-800 font-semibold'}`}
                                                        >
                                                            {isActive ? <IconCheck className="w-3 h-3 text-slate-950" /> : <span className="w-1.5 h-1.5 rounded-full bg-slate-500 inline-block" />}
                                                            {preset.label}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {/* Main Task Grid Table */}
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse min-w-[1000px] table-fixed">
                                                <thead>
                                                    <tr className="bg-brandNavy-950/80 text-[10px] uppercase font-mono tracking-wider text-slate-400 border-b border-brandNavy-700">
                                                        <th className="py-4 px-5 text-center w-[6%]">Active</th>
                                                        <th className="py-4 px-4 w-[16%]">Category</th>
                                                        <th className="py-4 px-4 w-[41%]">Deliverable Specifications</th>
                                                        <th className="py-4 px-4 text-center w-[12%]">Estimated Hours</th>
                                                        <th className="py-4 px-4 text-center w-[12%]">Rate Basis</th>
                                                        <th className="py-4 px-5 text-right w-[13%] font-bold text-brandBlue-400">Base Price</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-brandNavy-700/40">
                                                    {tasks.map((task) => (
                                                        <tr key={task.id} className={`transition-all duration-150 ${task.selected ? 'bg-brandNavy-900/40' : 'bg-brandNavy-950/10 opacity-30 hover:opacity-60'}`}>
                                                            <td className="py-4 px-5 text-center">
                                                                <div className="flex items-center justify-center gap-1">
                                                                    <button onClick={() => toggleTask(task.id)} className="p-1 rounded text-slate-400 hover:text-brandBlue-500 inline-flex transition-colors">
                                                                        {task.selected ? <IconCheckSquare /> : <IconSquare />}
                                                                    </button>
                                                                    {task.id.startsWith('custom-') && (
                                                                        <button onClick={() => removeTask(task.id)} className="p-1 text-rose-500 hover:text-rose-400 rounded transition-colors" title="Delete custom task">
                                                                            <IconTrash className="w-3.5 h-3.5" />
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </td>
                                                            <td className="py-4 px-4">
                                                                <span className="text-[10px] font-mono bg-brandNavy-950 px-2.5 py-1 rounded border border-brandNavy-700/80 text-brandBlue-400 font-bold tracking-wide block text-center truncate">
                                                                    {task.category.replace(/^\d+\.\s/, '')}
                                                                </span>
                                                            </td>
                                                            <td className="py-4 px-4">
                                                                <h4 className="font-bold text-sm text-slate-200">{task.deliverable}</h4>
                                                                <p className="text-[11px] text-slate-400 mt-0.5 leading-relaxed line-clamp-2">{task.description}</p>
                                                            </td>
                                                            <td className="py-4 px-4 text-center">
                                                                <input 
                                                                    type="number" 
                                                                    min="0" 
                                                                    value={task.estHours} 
                                                                    onChange={(e) => updateTaskField(task.id, 'estHours', e.target.value)} 
                                                                    className="w-16 bg-brandNavy-950 border border-brandNavy-700 rounded px-1.5 py-1 text-xs text-center font-mono font-bold text-slate-200 focus:border-brandBlue-500 focus:outline-none" 
                                                                    disabled={!task.selected} 
                                                                />
                                                            </td>
                                                            <td className="py-4 px-4">
                                                                <input 
                                                                    type="number" 
                                                                    step="100" 
                                                                    value={task.rate} 
                                                                    onChange={(e) => updateTaskField(task.id, 'rate', e.target.value)} 
                                                                    className="w-20 mx-auto bg-brandNavy-950 border border-brandNavy-700 rounded px-2 py-1 text-xs text-center font-mono font-bold text-slate-200 block focus:border-brandBlue-500 focus:outline-none" 
                                                                    disabled={!task.selected} 
                                                                />
                                                            </td>
                                                            <td className="py-4 px-5 text-right">
                                                                <span className="text-xs font-mono font-bold text-slate-100 whitespace-nowrap">
                                                                    {formatCurrency(task.estHours * task.rate)}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>

                                        {/* Custom Task Entry Form with Advanced Scope Inputs */}
                                        <div className="p-6 bg-brandNavy-950/80 border-t border-brandNavy-700 space-y-4">
                                            <span className="text-xs font-mono font-bold tracking-widest text-brandBlue-400 uppercase block">➕ Add Custom Work Deliverable</span>
                                            
                                            <form onSubmit={addNewTask} className="space-y-4">
                                                <div className="grid grid-cols-1 md:grid-cols-12 gap-4">

                                                <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Quote ID</label>
                                                <input type="text" value={quoteId} onChange={(e) => setQuoteId(e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500 font-mono" />

                                            <div>
                                                <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Quote Date</label>

                                            <div className="text-slate-700 font-semibold">{clientCompany}</div>

                                            <div className="font-bold text-slate-955 text-base">{preparedBy}</div>
                                            <div className="text-slate-700 font-semibold text-xs">{preparerTitle}</div>
                                        </div>
                                    </div>

                                                        </td>
                                                    </tr>
                                                ))}

                                        </table>
                                    </div>

                                        <div className="text-xs text-slate-500 max-w-md leading-relaxed text-left">
                                            <strong className="text-slate-700 block mb-1 font-bold">Fixed Flat-Rate Guarantee:</strong>
                                            All engagement pricing is flat-rate and outcome-driven, ensuring zero scope-creep adjustments, hourly calculations, or invoice surprises during project lifecycles.

                                                <span className="text-xs text-slate-705 leading-normal font-sans">

                                                </span>
                                            </div>
                                        </div>
                                        <div className="text-right space-y-1.5 shrink-0 min-w-[250px] border-l border-slate-200 pl-6 flex flex-col justify-center">

                                                <span>Estimated Duration:</span>
                                                <span className="font-bold text-slate-900">{projectTimeline}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs text-slate-650 border-t border-slate-200 pt-2 font-mono">

                                                <span className="font-bold text-slate-900">{formatCurrency(summary.subtotalCost)}</span>
                                            </div>
                                            {includeTax && (

                                                </div>
                                            )}

                                    </div>

                                                </div>
                                                <p className="text-xs text-slate-500 mt-2 leading-relaxed">

                                                </p>
                                            </div>
                                        ) : isUnder4Weeks ? (

                                                <div className="p-3 bg-slate-50 rounded border border-slate-200">

                                                    <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">
                                                        {formatCurrency(summary.totalCost * 0.5)}
                                                    </span>
                                                </div>
                                                <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                    <div className="font-bold text-slate-800">2. Handover & Completion (50%)</div>
                                                    <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">
                                                        {formatCurrency(summary.totalCost * 0.5)}
                                                    </span>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs font-sans font-medium">
                                                <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                    <div className="font-bold text-slate-800">1. Kickoff Mobilization (30%)</div>
                                                    <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">
                                                        {formatCurrency(summary.totalCost * 0.3)}
                                                    </span>
                                                </div>
                                                <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                    <div className="font-bold text-slate-800">2. Mid-point SOP Handover (40%)</div>
                                                    <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">
                                                        {formatCurrency(summary.totalCost * 0.4)}
                                                    </span>
                                                </div>
                                                <div className="p-3 bg-slate-50 rounded border border-slate-200">
                                                    <div className="font-bold text-slate-800">3. Handover & Training (30%)</div>
                                                    <span className="font-mono text-brandBlue-600 print-accent font-bold mt-1 block">
                                                        {formatCurrency(summary.totalCost * 0.3)}
                                                    </span>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Standard terms of service */}
                                    <div className="text-[9px] text-slate-505 space-y-2 pb-6 border-b border-slate-200 mb-8 print-divider leading-relaxed">
                                        <strong className="text-slate-700 block text-[10px] uppercase font-mono font-bold font-sans font-semibold">Standard Professional Terms</strong>
                                        <p>1. <strong>Scope of Services & Scope Variations:</strong> Services are strictly limited to the SOW items selected. Any modifications requested by the Client shall require a signed Change Order specifying additional hours and timeline extensions.</p>
                                        <p>2. <strong>Client Cooperation & Operational Timelines:</strong> Project timelines remain suspended if critical data dependencies or stakeholder calendars are delayed by the Client by more than 5 business days.</p>
                                        <p>3. <strong>Professional Compensation, Taxes, and Late Payments:</strong> Total professional fees are ex-VAT. Invoice settlement is required within seven (7) business days of receipt.</p>
                                        <p>4. <strong>Intellectual Property Rights:</strong> Upon receipt of full and final payment, the Client shall own all custom playbooks, handbooks, and process maps drafted specifically for this engagement.</p>
                                        <p>5. <strong>Limitation of Liability & Operational Indemnity:</strong> In no event shall Kolthoff Consulting's liability exceed the total fees paid by the Client under this quotation.</p>
                                        <p>6. <strong>Dispute Resolution & Jurisdiction:</strong> Disputes arising from this contract shall fall under the exclusive jurisdiction of the courts of Taytay, Rizal, Calabarzon.</p>
                                        
                                        <div className="mt-4 pt-3 border-t border-slate-100">
                                            <strong className="text-slate-700 block text-[10px] uppercase font-mono font-bold font-sans font-semibold font-bold">Settlement & Bank Details</strong>
                                            <div className="ml-4 pl-3 border-l-2 border-brandBlue-500 font-mono text-[9px] text-slate-700 space-y-0.5 bg-slate-50 py-1.5 rounded">
                                                <div>Bank Name: <strong>BDO Unibank Inc.</strong></div>
                                                <div>Account Name: <strong>Reinhard Ludwig A. Kolthoff</strong></div>
                                                <div>Account Number: <strong>0039 5019 0761</strong></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Signature Blocks */}
                                    <div className="pt-8 text-xs font-sans font-semibold">
                                        <div className="grid grid-cols-2 gap-12 sm:gap-24">
                                            <div className="space-y-12 flex flex-col justify-between">
                                                <p className="text-slate-650 font-bold font-sans">Approved and Accepted by:</p>
                                                <div className="border-t border-slate-300 pt-2 text-[10px] space-y-0.5">
                                                    <div className="font-bold text-slate-900">{clientRep}</div>
                                                    <div className="text-slate-500">{clientCompany} Representative</div>
                                                    <div className="text-slate-400">Date: ________________________</div>
                                                </div>
                                            </div>
                                            <div className="space-y-12 flex flex-col justify-between">
                                                <p className="text-slate-650 font-bold font-sans">Submitted by:</p>
                                                <div className="border-t border-slate-300 pt-2 text-[10px] space-y-0.5">
                                                    <div className="font-bold text-slate-900 font-sans">{preparedBy}</div>
                                                    <div className="text-slate-500">{preparerTitle}, Kolthoff Consulting</div>
                                                    <div className="text-slate-400">Date: {quoteDate}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render the React components inside the virtual DOM mount standard
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
