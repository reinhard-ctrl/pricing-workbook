<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolthoff Consulting - Internal Pricing Engine</title>
    
    <!-- Google Fonts: Montserrat (Website Primary) & Playfair Display (Editorial Accents) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN with Custom Brand Palette Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: {
                            950: '#020613', // Ultra-dark corporate space
                            900: '#09111F', // Rich navy base
                            800: '#0F1A2C', // Deep card background
                            700: '#1B2C46', // Panel borders and dividers
                            600: '#2E4567', // Subdued text and inactive strokes
                        },
                        brandBlue: {
                            50: '#F0F6FF',
                            100: '#E0EDFF',
                            200: '#C2DBFF',
                            300: '#99C4FF',
                            400: '#60A1FA', // Highlighting element
                            500: '#2563EB', // Premium solid corporate blue
                            600: '#1D4ED8',
                            700: '#1E40AF',
                            850: '#0F2963', // Internal container accents
                            950: '#0B1731', // Deep glow shadows
                        }
                    },
                    fontFamily: {
                        sans: ['"Montserrat"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel CDN (Compiles JSX inside the browser dynamically) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar adjustments matching brand navy palette */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020613; }
        ::-webkit-scrollbar-thumb { background: #0F1A2C; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563EB; }
        
        /* Premium Soft Radial Background Gradient */
        .luxury-gradient {
            background: radial-gradient(circle at 50% -20%, #0F1A2C 0%, #020613 100%);
        }
    </style>
</head>
<body class="luxury-gradient text-slate-100 antialiased selection:bg-brandBlue-600 selection:text-white min-h-screen">

    <!-- Target mount node for React -->
    <div id="root"></div>

    <!-- Inline SVGs mapped as React components to prevent CDN asset mapping issues -->
    <script type="text/babel">
        const { useState, useMemo } = React;

        // HIGH FIDELITY LOGO (Gear integrated with Rising Bar Chart inside an interlocking shield layout)
        const IconWebsiteLogo = () => (
            <svg class="w-12 h-12 text-brandBlue-400" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                {/* Outer Circular Shield Base */}
                <path d="M50 12 L85 24 V55 C85 75 70 87 50 92 C30 87 15 75 15 55 V24 L50 12 Z" fill="#09111F" stroke="#2563EB" stroke-width="4" stroke-linejoin="round"/>
                
                {/* Embedded Growth Chart Bars */}
                <rect x="36" y="52" width="6" height="18" rx="1.5" fill="#2563EB" opacity="0.8"/>
                <rect x="47" y="42" width="6" height="28" rx="1.5" fill="#60A1FA"/>
                <rect x="58" y="32" width="6" height="38" rx="1.5" fill="#99C4FF"/>
                
                {/* Interlocking Gear Outline Teeth on left quadrant */}
                <path d="M26 44 L22 42" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
                <path d="M24 53 L20 53" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
                <path d="M26 62 L22 64" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
                <path d="M32 69 L29 73" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
                
                {/* Connecting Trend Vector line */}
                <path d="M33 56 L47 43 L61 31" stroke="#E0EDFF" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="61" cy="31" r="3.5" fill="#F0F6FF" stroke="#2563EB" stroke-width="1.5"/>
            </svg>
        );

        const IconCheckSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-brandBlue-400"><path d="m9 11 3 3 7-7"/><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-600"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
        const IconCalculator = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x1="16" y1="6" y2="6"/><line x1="16" x1="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
        const IconClock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x1="10" y1="11" y2="17"/><line x1="14" x1="14" y1="11" y2="17"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5 text-emerald-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-brandBlue-400 shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

        const INITIAL_TASKS = [
            { id: 'diag-1', category: '1. Operational Diagnostics', deliverable: 'Preparation & Onboarding', description: 'Client kickoff meeting, data security brief, and initial corporate baseline data acquisition.', minHours: 3, maxHours: 4, rate: 2500, selected: true },
            { id: 'diag-2', category: '1. Operational Diagnostics', deliverable: 'Stakeholder Discovery', description: 'Friction-Adjusted discovery loop (structured interviews with 4-6 key leadership roles, accounts, and desk operators).', minHours: 8, maxHours: 12, rate: 2500, selected: true },
            { id: 'diag-3', category: '1. Operational Diagnostics', deliverable: 'On-Site Observation Audit', description: 'Two continuous days of in-person workflow shadowing, step-timing, and bottleneck mapping.', minHours: 16, maxHours: 20, rate: 2500, selected: true },
            { id: 'diag-4', category: '1. Operational Diagnostics', deliverable: 'Forensic Systemic Audit', description: 'Compliance gap review (DOLE liability exposures) & technology subscription license audit.', minHours: 8, maxHours: 12, rate: 2500, selected: true },
            { id: 'diag-5', category: '1. Operational Diagnostics', deliverable: 'Risk Matrix Formulation', description: 'Synthesis of raw observation data into a highly prioritized B2B Operational Risk Matrix.', minHours: 5, maxHours: 8, rate: 2500, selected: true },
            { id: 'diag-6', category: '1. Operational Diagnostics', deliverable: 'Debrief & Roadmap Handover', description: 'Boardroom-ready presentation of audit discoveries, immediate quick wins, and strategic options.', minHours: 4, maxHours: 6, rate: 2500, selected: true },
            { id: 'sop-1', category: '2. Scale-Ready SOPs & HR', deliverable: 'Role Inventory & Scope Map', description: 'Systematic inventory of current state boundaries, functional responsibilities, and structural loops.', minHours: 10, maxHours: 15, rate: 2500, selected: false },
            { id: 'sop-2', category: '2. Scale-Ready SOPs & HR', deliverable: 'Swimlane Process Mapping', description: 'Friction-Adjusted mapping of high-fidelity, cross-functional swimlane diagrams (up to 5 core business workflows).', minHours: 45, maxHours: 55, rate: 2500, selected: false },
            { id: 'sop-3', category: '2. Scale-Ready SOPs & HR', deliverable: 'HR Templates & Compliance', description: 'Reviewing local contract standards, drafting standard employment templates and onboarding forms.', minHours: 15, maxHours: 25, rate: 2500, selected: false },
            { id: 'sop-4', category: '2. Scale-Ready SOPs & HR', deliverable: 'Employee Handbook Assembly', description: 'Friction-Adjusted compilation of compliant behavioral rules, leaves, local benefits, and code of conduct manuals.', minHours: 20, maxHours: 30, rate: 2500, selected: false },
            { id: 'sop-5', category: '2. Scale-Ready SOPs & HR', deliverable: 'Operations Playbook Launch', description: 'Indexing, publishing, and organizing digital documentation ready for internal training deployment.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'sop-6', category: '2. Scale-Ready SOPs & HR', deliverable: 'Handover & Training Workshops', description: 'Interactive leadership alignment workshops to secure swift corporate adoption.', minHours: 5, maxHours: 8, rate: 2500, selected: false },
            { id: 'trans-1', category: '3. 90-Day Transformation Sprint', deliverable: 'Value Stream Mapping (VSM)', description: 'Hosting dedicated value stream workshops to expose administrative and operational waste.', minHours: 20, maxHours: 30, rate: 2500, selected: false },
            { id: 'trans-2', category: '3. 90-Day Transformation Sprint', deliverable: 'Waste & Backlog Elimination', description: 'Conducting target sprints focusing on reducing administrative waste and re-routing slow paths.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'trans-3', category: '3. 90-Day Transformation Sprint', deliverable: 'Core Metric & KPI Tuning', description: 'Re-engineering custom, clean key performance indicators across major organizational divisions.', minHours: 15, maxHours: 20, rate: 2500, selected: false },
            { id: 'trans-4', category: '3. 90-Day Transformation Sprint', deliverable: 'Process Re-engineering', description: 'Complete hands-on overhaul of slow processing steps, documents, routing tools, and integrations.', minHours: 40, maxHours: 50, rate: 2500, selected: false },
            { id: 'trans-5', category: '3. 90-Day Transformation Sprint', deliverable: 'Implementation Coaching', description: 'Side-by-side coaching alongside process champions to manage team friction during rollouts.', minHours: 50, maxHours: 60, rate: 2500, selected: false },
            { id: 'trans-6', category: '3. 90-Day Transformation Sprint', deliverable: 'Dashboard Integration', description: 'Friction-Adjusted setup of Visually automated, live tracking metrics and dashboards for leadership review.', minHours: 25, maxHours: 35, rate: 2500, selected: false },
            { id: 'coo-1', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'Operations Alignment Meetings', description: 'Directing weekly leadership alignment loops, metrics tracking, and project accountability.', minHours: 6, maxHours: 8, rate: 2500, selected: false },
            { id: 'coo-2', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'KPI & OKR Metric Governance', description: 'Evaluating monthly departmental execution scores and managing core governance KPIs.', minHours: 8, maxHours: 10, rate: 2500, selected: false },
            { id: 'coo-3', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'Continuous Optimization Sprints', description: 'Auditing ongoing processes to continue manual step reduction and automate workflows.', minHours: 8, maxHours: 10, rate: 2500, selected: false },
            { id: 'coo-4', category: '4. Fractional COO (Monthly Engagement)', deliverable: 'High-Level C-Suite Advisory', description: 'Direct, on-demand executive consulting, labor compliance advisory, and long-term scaling strategy.', minHours: 4, maxHours: 6, rate: 2500, selected: false }
        ];

        function App() {
            const [tasks, setTasks] = useState(INITIAL_TASKS);
            const [globalRate, setGlobalRate] = useState(2500);
            const [copied, setCopied] = useState(false);
            const [activePreset, setActivePreset] = useState('diagnostics'); 
            
            // Strategic Adjustments State Variables (From PH Audit File)
            const [frictionBuffer, setFrictionBuffer] = useState(15); // Friction and Hirit Buffer slider (+0% to +30%)
            const [delegatePercent, setDelegatePercent] = useState(60); // % of hours delegated to Associates (Cost: ₱350/hr) vs Principal (₱1,500/hr)
            
            const [newTaskCategory, setNewTaskCategory] = useState('1. Operational Diagnostics');
            const [newTaskDeliv, setNewTaskDeliv] = useState('');
            const [newTaskDesc, setNewTaskDesc] = useState('');
            const [newTaskMin, setNewTaskMin] = useState(5);
            const [newTaskMax, setNewTaskMax] = useState(10);

            const handleSelectPackage = (packageName) => {
                setActivePreset(packageName); 
                setTasks(prev => prev.map(t => {
                    let isSelected = false;
                    if (packageName === 'diagnostics' && t.category.includes('1. Operational Diagnostics')) isSelected = true;
                    else if (packageName === 'sop' && t.category.includes('2. Scale-Ready SOPs')) isSelected = true;
                    else if (packageName === 'transformation' && t.category.includes('3. 90-Day Transformation')) isSelected = true;
                    else if (packageName === 'coo' && t.category.includes('4. Fractional COO')) isSelected = true;
                    else if (packageName === 'all') isSelected = true;
                    return { ...t, selected: isSelected };
                }));
            };

            const applyGlobalRate = (rate) => {
                setGlobalRate(rate);
                setTasks(prev => prev.map(t => ({ ...t, rate: rate })));
            };

            const toggleTask = (id) => {
                setActivePreset('custom'); 
                setTasks(prev => prev.map(t => t.id === id ? { ...t, selected: !t.selected } : t));
            };

            const updateTaskField = (id, field, value) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, [field]: Number(value) } : t));
            };

            const addNewTask = (e) => {
                e.preventDefault();
                if (!newTaskDeliv) return;
                setActivePreset('custom');
                
                const newTask = {
                    id: `custom-${Date.now()}`,
                    category: newTaskCategory,
                    deliverable: newTaskDeliv,
                    description: newTaskDesc || 'Bespoke client scope requirement.',
                    minHours: Number(newTaskMin),
                    maxHours: Number(newTaskMax),
                    rate: globalRate,
                    selected: true
                };

                setTasks(prev => [...prev, newTask]);
                setNewTaskDeliv('');
                setNewTaskDesc('');
            };

            const removeTask = (id) => {
                setTasks(prev => prev.filter(t => t.id !== id));
            };

            // Enhanced Summary Calculation Block factoring in PH Friction & Resource Delegation Mix
            const summary = useMemo(() => {
                const selectedTasks = tasks.filter(t => t.selected);
                
                const rawMinHours = selectedTasks.reduce((acc, curr) => acc + curr.minHours, 0);
                const rawMaxHours = selectedTasks.reduce((acc, curr) => acc + curr.maxHours, 0);
                
                // 1. Friction & Hirit Buffer Multiplier
                const bufferMultiplier = 1 + (frictionBuffer / 100);
                const minHours = Math.round(rawMinHours * bufferMultiplier);
                const maxHours = Math.round(rawMaxHours * bufferMultiplier);
                
                // Dynamic client-facing project values with buffer integration
                const minCost = Math.round(selectedTasks.reduce((acc, curr) => acc + (curr.minHours * curr.rate), 0) * bufferMultiplier);
                const maxCost = Math.round(selectedTasks.reduce((acc, curr) => acc + (curr.maxHours * curr.rate), 0) * bufferMultiplier);
                
                // 2. Junior-Senior Delivery Leverage Calculations
                const assocRate = 350;      // Junior Associate Cost/Hr
                const principalRate = 1500;  // Your partner execution value/Hr
                
                const assocRatio = delegatePercent / 100;
                const principalRatio = 1 - assocRatio;
                
                // Estimated real cost to execute (deliver) based on hourly split
                const minInternalCost = Math.round((minHours * assocRatio * assocRate) + (minHours * principalRatio * principalRate));
                const maxInternalCost = Math.round((maxHours * assocRatio * assocRate) + (maxHours * principalRatio * principalRate));
                
                // Profit margin parameters
                const minNetProfit = minCost - minInternalCost;
                const maxNetProfit = maxCost - maxInternalCost;
                const profitMarginPercent = minCost > 0 ? Math.round((minNetProfit / minCost) * 100) : 0;
                
                return {
                    count: selectedTasks.length,
                    rawMinHours,
                    rawMaxHours,
                    minHours,
                    maxHours,
                    minCost,
                    maxCost,
                    minInternalCost,
                    maxInternalCost,
                    minNetProfit,
                    maxNetProfit,
                    profitMarginPercent
                };
            }, [tasks, frictionBuffer, delegatePercent]);

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val);
            };

            const proposalSummaryText = useMemo(() => {
                const activeOnes = tasks.filter(t => t.selected);
                let output = `### PROPOSAL ESTIMATE SUMMARY - KOLTHOFF CONSULTING\n`;
                output += `* **Total Selected Tasks**: ${summary.count}\n`;
                output += `* **Scoping Hours (Buffered)**: ${summary.minHours} - ${summary.maxHours} Target Hours\n`;
                output += `* **Friction & Hirit Safety Buffer**: +${frictionBuffer}%\n`;
                output += `* **Total Estimated Investment**: ${formatCurrency(summary.minCost)} to ${formatCurrency(summary.maxCost)} (PHP Ex-Tax)\n\n`;
                output += `#### SCOPE OF INCLUDED WORK ITEMS:\n`;
                
                let currentCat = '';
                activeOnes.forEach(t => {
                    if (t.category !== currentCat) {
                        currentCat = t.category;
                        output += `\n**${currentCat.toUpperCase()}**\n`;
                    }
                    output += `- [x] **${t.deliverable}**: ${t.description} (Approx. ${Math.round(t.minHours * (1 + frictionBuffer/100))}-${Math.round(t.maxHours * (1 + frictionBuffer/100))} hrs)\n`;
                });
                return output;
            }, [tasks, summary, frictionBuffer]);

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = proposalSummaryText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div class="font-sans min-h-screen">
                    {/* Aligned Internal Executive Header */}
                    <header class="border-b border-brandNavy-700 bg-brandNavy-900/90 backdrop-blur-md sticky top-0 z-50">
                        <div class="max-w-[1600px] mx-auto px-6 sm:px-8 h-24 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <IconWebsiteLogo />
                                <div>
                                    <span class="font-sans font-extrabold tracking-wider text-xl uppercase block text-slate-100">
                                        KOLTHOFF <span class="text-brandBlue-400">CONSULTING</span>
                                    </span>
                                    <span class="text-[10px] text-brandBlue-400 font-mono tracking-[0.25em] uppercase block -mt-1 font-bold">Internal Partner Operations Portal</span>
                                </div>
                            </div>
                            
                            {/* Internal Navigation links */}
                            <nav class="hidden lg:flex items-center gap-8 text-sm font-medium tracking-wide">
                                <a href="https://kolthoff-consulting.com/" target="_blank" rel="noopener noreferrer" class="text-slate-400 hover:text-brandBlue-400 transition-colors">Go to Public Site</a>
                                <span class="text-brandNavy-600 select-none">|</span>
                                <span class="text-brandBlue-400 font-semibold flex items-center gap-1.5 bg-brandBlue-500/10 px-3.5 py-1.5 rounded border border-brandBlue-500/20 text-xs tracking-wider uppercase font-mono">
                                    <span class="w-1.5 h-1.5 bg-brandBlue-400 rounded-full animate-pulse"></span>
                                    Confidential Scope Planner
                                </span>
                            </nav>

                            <div class="flex items-center gap-4">
                                <span class="px-3.5 py-1.5 bg-brandNavy-950 border border-red-500/30 text-rose-400 font-mono text-[10px] font-bold tracking-widest uppercase rounded">
                                    Internal Use Only
                                </span>
                            </div>
                        </div>
                    </header>

                    <div class="p-4 sm:p-6 lg:p-8 max-w-[1600px] mx-auto">
                        
                        {/* Internal Executive Workstation Banner */}
                        <div class="mb-10 text-center py-6 relative">
                            <span class="text-xs font-mono font-bold tracking-[0.3em] text-brandBlue-400 uppercase bg-brandBlue-950/40 border border-brandBlue-900/30 px-3.5 py-1.5 rounded-md inline-block mb-3">
                                CONFIDENTIAL WORKING DOCUMENT
                            </span>
                            <h2 class="text-2xl sm:text-4xl font-sans font-black tracking-tight text-slate-100 max-w-4xl mx-auto leading-tight">
                                Proposal Scope & Margin Calibration Engine
                            </h2>
                            <p class="text-xs sm:text-sm text-slate-400 mt-3 max-w-2xl mx-auto leading-relaxed">
                                Sandbox tool integrating the PH Friction & scope creep audit. Toggle deliverables, calibrate hirit buffers, and model staff delegation metrics.
                            </p>
                        </div>

                        {/* Top Global Parameter Controller */}
                        <div class="mb-8 bg-brandNavy-800/60 border border-brandNavy-700/80 rounded-xl p-5 flex flex-col md:flex-row items-center justify-between gap-6 shadow-xl">
                            <div class="flex items-center gap-3">
                                <div class="p-2.5 rounded-lg bg-brandBlue-500/10 text-brandBlue-400 border border-brandBlue-500/20">
                                    <IconCalculator className="w-5 h-5" />
                                </div>
                                <div>
                                    <h3 class="text-xs font-bold font-mono tracking-wider text-slate-400 uppercase">Consultant Billing Base</h3>
                                    <p class="text-xs text-slate-500 mt-0.5">Toggle rate basis between associate-led, senior-led, and principal executive frameworks.</p>
                                </div>
                            </div>
                            
                            <div class="flex gap-2">
                                {[1500, 2500, 3500].map((rate) => (
                                    <button 
                                        key={rate} 
                                        onClick={() => applyGlobalRate(rate)} 
                                        class={`px-5 py-2.5 text-xs font-bold rounded border transition-all ${globalRate === rate ? 'bg-gradient-to-r from-brandBlue-600 to-brandBlue-500 text-slate-950 border-brandBlue-400 shadow-md shadow-brandBlue-950/20 font-extrabold' : 'bg-brandNavy-950 text-slate-400 border-brandNavy-700 hover:border-brandNavy-700 hover:text-slate-200'}`}
                                    >
                                        ₱{rate.toLocaleString()} / hr
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* App Grid */}
                        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8 items-start">
                            
                            {/* Table Container (9 Columns width on XL) */}
                            <div class="xl:col-span-9 bg-brandNavy-900/30 border border-brandNavy-700/80 rounded-xl overflow-hidden shadow-2xl backdrop-blur-sm">
                                
                                {/* Preset Controls Bar */}
                                <div class="p-5 bg-brandNavy-950/80 border-b border-brandNavy-700/80 flex flex-wrap gap-3 items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <span class="w-1.5 h-1.5 rounded-full bg-brandBlue-500 animate-pulse"></span>
                                        <span class="text-xs font-mono tracking-wider text-slate-300 uppercase font-semibold">Contract Preset Profiles</span>
                                    </div>
                                    <div class="flex flex-wrap gap-2">
                                        <button 
                                            onClick={() => handleSelectPackage('diagnostics')} 
                                            class={`px-3.5 py-1.5 text-xs font-bold rounded transition-all ${activePreset === 'diagnostics' ? 'bg-brandBlue-500 text-slate-950 shadow-md font-extrabold' : 'bg-brandNavy-900 text-slate-300 border border-brandNavy-700 hover:bg-brandNavy-800'}`}
                                        >
                                            Diagnostics Audit
                                        </button>
                                        <button 
                                            onClick={() => handleSelectPackage('sop')} 
                                            class={`px-3.5 py-1.5 text-xs font-bold rounded transition-all ${activePreset === 'sop' ? 'bg-brandBlue-500 text-slate-950 shadow-md font-extrabold' : 'bg-brandNavy-900 text-slate-300 border border-brandNavy-700 hover:bg-brandNavy-800'}`}
                                        >
                                            SOP Foundations
                                        </button>
                                        <button 
                                            onClick={() => handleSelectPackage('transformation')} 
                                            class={`px-3.5 py-1.5 text-xs font-bold rounded transition-all ${activePreset === 'transformation' ? 'bg-brandBlue-500 text-slate-950 shadow-md font-extrabold' : 'bg-brandNavy-900 text-slate-300 border border-brandNavy-700 hover:bg-brandNavy-800'}`}
                                        >
                                            90-Day Sprint
                                        </button>
                                        <button 
                                            onClick={() => handleSelectPackage('coo')} 
                                            class={`px-3.5 py-1.5 text-xs font-bold rounded transition-all ${activePreset === 'coo' ? 'bg-brandBlue-500 text-slate-950 shadow-md font-extrabold' : 'bg-brandNavy-900 text-slate-300 border border-brandNavy-700 hover:bg-brandNavy-800'}`}
                                        >
                                            Fractional COO
                                        </button>
                                        <span class="text-slate-800 py-1 font-light self-center">|</span>
                                        <button 
                                            onClick={() => handleSelectPackage('all')} 
                                            class={`px-3.5 py-1.5 text-xs font-bold rounded transition-all ${activePreset === 'all' ? 'bg-slate-100 text-slate-950 font-extrabold' : 'bg-brandNavy-900 text-slate-300 border border-brandNavy-700 hover:bg-brandNavy-800'}`}
                                        >
                                            Select All
                                        </button>
                                    </div>
                                </div>

                                {/* Main Task Grid Table */}
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse min-w-[1000px] table-fixed">
                                        <thead>
                                            <tr class="bg-brandNavy-950/80 text-[10px] uppercase font-mono tracking-wider text-slate-400 border-b border-brandNavy-700">
                                                <th class="py-4 px-5 text-center w-[5%]">Active</th>
                                                <th class="py-4 px-4 w-[16%]">Category</th>
                                                <th class="py-4 px-4 w-[38%]">Deliverable Specifications</th>
                                                <th class="py-4 px-4 text-center w-[14%]">Hours (Min - Max)</th>
                                                <th class="py-4 px-4 text-center w-[11%]">Rate Basis</th>
                                                <th class="py-4 px-5 text-right w-[14%] font-bold text-brandBlue-400">Base Price (Unbuffered)</th>
                                                <th class="py-4 px-4 text-center w-[3%]"></th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-brandNavy-700/40">
                                            {tasks.map((task) => (
                                                <tr key={task.id} class={`transition-all duration-150 ${task.selected ? 'bg-brandNavy-900/40' : 'bg-brandNavy-950/10 opacity-30 hover:opacity-60'}`}>
                                                    <td class="py-4 px-5 text-center">
                                                        <button onClick={() => toggleTask(task.id)} class="p-1 rounded text-slate-400 hover:text-brandBlue-500 inline-flex transition-colors">
                                                            {task.selected ? <IconCheckSquare /> : <IconSquare />}
                                                        </button>
                                                    </td>
                                                    <td class="py-4 px-4">
                                                        <span class="text-[10px] font-mono bg-brandNavy-950 px-2.5 py-1 rounded border border-brandNavy-700/80 text-brandBlue-400 font-bold tracking-wide block text-center truncate">
                                                            {task.category.replace(/^\d+\.\s/, '')}
                                                        </span>
                                                    </td>
                                                    <td class="py-4 px-4">
                                                        <h4 class="font-bold text-sm text-slate-200">{task.deliverable}</h4>
                                                        <p class="text-[11px] text-slate-400 mt-0.5 leading-relaxed line-clamp-2">{task.description}</p>
                                                    </td>
                                                    <td class="py-4 px-4">
                                                        <div class="flex items-center justify-center gap-1.5">
                                                            <input 
                                                                type="number" 
                                                                min="0" 
                                                                value={task.minHours} 
                                                                onChange={(e) => updateTaskField(task.id, 'minHours', e.target.value)} 
                                                                class="w-12 bg-brandNavy-950 border border-brandNavy-700 rounded px-1.5 py-1 text-xs text-center font-mono font-bold text-slate-200 focus:border-brandBlue-500 focus:outline-none" 
                                                                disabled={!task.selected} 
                                                            />
                                                            <span class="text-slate-600 font-bold">-</span>
                                                            <input 
                                                                type="number" 
                                                                min="0" 
                                                                value={task.maxHours} 
                                                                onChange={(e) => updateTaskField(task.id, 'maxHours', e.target.value)} 
                                                                class="w-12 bg-brandNavy-950 border border-brandNavy-700 rounded px-1.5 py-1 text-xs text-center font-mono font-bold text-slate-200 focus:border-brandBlue-500 focus:outline-none" 
                                                                disabled={!task.selected} 
                                                            />
                                                        </div>
                                                    </td>
                                                    <td class="py-4 px-4">
                                                        <input type="number" step="100" value={task.rate} onChange={(e) => updateTaskField(task.id, 'rate', e.target.value)} class="w-20 mx-auto bg-brandNavy-950 border border-brandNavy-700 rounded px-2 py-1 text-xs text-center font-mono font-bold text-slate-200 block focus:border-brandBlue-500 focus:outline-none" disabled={!task.selected} />
                                                    </td>
                                                    <td class="py-4 px-5 text-right">
                                                        <span class="text-xs font-mono font-bold text-slate-100 whitespace-nowrap">
                                                            {formatCurrency(task.minHours * task.rate)} - {formatCurrency(task.maxHours * task.rate)}
                                                        </span>
                                                    </td>
                                                    <td class="py-4 px-4 text-center">
                                                        <button onClick={() => removeTask(task.id)} class="p-1 text-slate-600 hover:text-rose-400 rounded transition-colors inline-flex"><IconTrash /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                {/* Custom Scoped Task Row Form */}
                                <form onSubmit={addNewTask} class="p-5 bg-brandNavy-950/80 border-t border-brandNavy-700 grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                                    <div class="md:col-span-3">
                                        <label class="text-[10px] font-mono text-slate-400 uppercase tracking-wider block mb-1">Target Category</label>
                                        <select value={newTaskCategory} onChange={(e) => setNewTaskCategory(e.target.value)} class="w-full bg-brandNavy-900 border border-brandNavy-700 rounded py-1.5 px-2 text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500">
                                            <option value="1. Operational Diagnostics">1. Diagnostics</option>
                                            <option value="2. Scale-Ready SOPs & HR">2. SOPs & HR</option>
                                            <option value="3. 90-Day Transformation Sprint">3. 90-Day Sprint</option>
                                            <option value="4. Fractional COO (Monthly Engagement)">4. Monthly COO</option>
                                        </select>
                                    </div>
                                    <div class="md:col-span-3">
                                        <label class="text-[10px] font-mono text-slate-400 uppercase tracking-wider block mb-1">New Task / Deliverable</label>
                                        <input type="text" placeholder="e.g., Advanced ERP Alignment" value={newTaskDeliv} onChange={(e) => setNewTaskDeliv(e.target.value)} class="w-full bg-brandNavy-900 border border-brandNavy-700 rounded py-1.5 px-3 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-brandBlue-500" />
                                    </div>
                                    <div class="md:col-span-4">
                                        <label class="text-[10px] font-mono text-slate-400 uppercase tracking-wider block mb-1">Operational SOW Description</label>
                                        <input type="text" placeholder="Scope constraints & outcomes..." value={newTaskDesc} onChange={(e) => setNewTaskDesc(e.target.value)} class="w-full bg-brandNavy-900 border border-brandNavy-700 rounded py-1.5 px-3 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-brandBlue-500" />
                                    </div>
                                    <div class="md:col-span-1">
                                        <label class="text-[10px] font-mono text-slate-400 uppercase tracking-wider block mb-1">Min/Max</label>
                                        <div class="flex gap-1">
                                            <input type="number" value={newTaskMin} onChange={(e) => setNewTaskMin(e.target.value)} class="w-12 bg-brandNavy-900 border border-brandNavy-700 rounded py-1.5 text-center text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500" />
                                            <input type="number" value={newTaskMax} onChange={(e) => setNewTaskMax(e.target.value)} class="w-12 bg-brandNavy-900 border border-brandNavy-700 rounded py-1.5 text-center text-xs text-slate-200 focus:outline-none focus:border-brandBlue-500" />
                                        </div>
                                    </div>
                                    <div class="md:col-span-1">
                                        <button type="submit" class="w-full bg-slate-100 hover:bg-brandBlue-500 hover:text-slate-950 text-slate-950 font-bold py-2 rounded text-xs transition-all flex items-center justify-center shrink-0"><IconPlus /> Add</button>
                                    </div>
                                </form>
                            </div>

                            {/* Summary & Markdown Exporter (3 Columns width on XL) */}
                            <div class="xl:col-span-3 space-y-6">
                                
                                {/* Calculations Panel */}
                                <div class="bg-brandNavy-900 border border-brandNavy-700 rounded-xl p-6 shadow-2xl relative overflow-hidden backdrop-blur-sm">
                                    <div class="absolute top-0 right-0 w-24 h-24 bg-brandBlue-500/5 blur-2xl rounded-full" />
                                    
                                    <h3 class="text-xs font-bold tracking-wider text-brandBlue-400 uppercase font-mono mb-4 flex items-center gap-2">
                                        <IconCalculator className="text-brandBlue-400" /> Internal Scoping Audit
                                    </h3>

                                    <div class="space-y-4 pb-6 border-b border-brandNavy-700 text-xs">
                                        <div class="flex justify-between items-center">
                                            <span class="text-slate-400">Total Tasks Selected:</span>
                                            <span class="text-slate-100 font-bold font-mono bg-brandNavy-950 px-2 py-0.5 rounded">{summary.count} / {tasks.length}</span>
                                        </div>
                                        <div class="flex justify-between items-center">
                                            <span class="text-slate-400">Cumulative Effort:</span>
                                            <span class="text-slate-100 font-bold font-mono flex items-center gap-1">
                                                <IconClock className="text-brandBlue-400" /> {summary.minHours} - {summary.maxHours} Target Hrs
                                            </span>
                                        </div>
                                        <div class="flex justify-between items-center text-slate-500 text-[10px]">
                                            <span>Base hours (unbuffered):</span>
                                            <span>{summary.rawMinHours} - {summary.rawMaxHours} hrs</span>
                                        </div>
                                        <div class="flex justify-between items-center">
                                            <span class="text-slate-400">Baseline Rate Basis:</span>
                                            <span class="text-slate-100 font-bold font-mono">₱{globalRate.toLocaleString()}/hr</span>
                                        </div>
                                    </div>

                                    {/* PH Market Buffer Tuning Section */}
                                    <div class="py-4 border-b border-brandNavy-700">
                                        <div class="flex justify-between items-center mb-1.5">
                                            <span class="text-[10px] font-mono tracking-widest text-brandBlue-400 uppercase font-bold block">Friction / Hirit Buffer</span>
                                            <span class="text-xs font-mono font-bold text-brandBlue-300">+{frictionBuffer}%</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="0" 
                                            max="30" 
                                            step="5"
                                            value={frictionBuffer} 
                                            onChange={(e) => setFrictionBuffer(parseInt(e.target.value))}
                                            class="w-full accent-brandBlue-400 bg-brandNavy-950 h-1 rounded-lg cursor-pointer"
                                        />
                                        <span class="text-[9px] text-slate-500 mt-1 block">Insulates against PH client delays and scope-creep.</span>
                                    </div>

                                    {/* Financial Valuations */}
                                    <div class="py-5 border-b border-brandNavy-700">
                                        <span class="text-[10px] font-mono tracking-widest text-slate-400 uppercase block">Buffered Proposal Range</span>
                                        <span class="text-2xl sm:text-3xl font-serif font-black bg-gradient-to-r from-brandBlue-200 via-brandBlue-400 to-brandBlue-500 bg-clip-text text-transparent mt-1.5 block leading-none">
                                            {formatCurrency(summary.minCost)}
                                        </span>
                                        <span class="text-xs text-slate-500 font-mono block my-1">to</span>
                                        <span class="text-2xl sm:text-3xl font-serif font-black bg-gradient-to-r from-brandBlue-200 via-brandBlue-400 to-brandBlue-500 bg-clip-text text-transparent block leading-none">
                                            {formatCurrency(summary.maxCost)}
                                        </span>
                                    </div>

                                    {/* INTERNAL DELEGATION & MARGIN PLANNER */}
                                    <div class="py-5 border-b border-brandNavy-700">
                                        <div class="flex justify-between items-center mb-1.5">
                                            <span class="text-[10px] font-mono tracking-widest text-brandBlue-400 uppercase font-bold block">Delegation (Associate %)</span>
                                            <span class="text-xs font-mono font-bold text-brandBlue-300">{delegatePercent}%</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="0" 
                                            max="100" 
                                            step="10"
                                            value={delegatePercent} 
                                            onChange={(e) => setDelegatePercent(parseInt(e.target.value))}
                                            class="w-full accent-brandBlue-400 bg-brandNavy-950 h-1 rounded-lg cursor-pointer"
                                        />
                                        <div class="mt-3 space-y-1.5 text-[11px] text-slate-400">
                                            <div class="flex justify-between">
                                                <span>Associate Effort (₱350/hr):</span>
                                                <span class="font-bold text-slate-200">{Math.round(summary.minHours * (delegatePercent/100))} hrs</span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span>Principal Effort (₱1,500/hr):</span>
                                                <span class="font-bold text-slate-200">{Math.round(summary.minHours * (1 - delegatePercent/100))} hrs</span>
                                            </div>
                                            <div class="flex justify-between pt-1 border-t border-brandNavy-750 font-semibold">
                                                <span>Est. Execution Cost:</span>
                                                <span class="text-rose-400 font-mono">{formatCurrency(summary.minInternalCost)}</span>
                                            </div>
                                        </div>
                                        
                                        <div class="mt-4 pt-3 border-t border-brandNavy-750">
                                            <span class="text-[10px] font-mono tracking-widest text-slate-400 uppercase block">Confidential Gross Profit ({summary.profitMarginPercent}%)</span>
                                            <span class="text-xl font-bold text-emerald-400 mt-1 block">
                                                {formatCurrency(summary.minNetProfit)} – {formatCurrency(summary.maxNetProfit)}
                                            </span>
                                        </div>
                                    </div>

                                    {/* 30-40-30 MILESTONE BILLING SCHEDULE */}
                                    <div class="py-5">
                                        <span class="text-[10px] font-mono tracking-widest text-brandBlue-400 uppercase font-bold block mb-3">Milestone Schedule (30-40-30)</span>
                                        <div class="space-y-2 text-xs">
                                            <div class="bg-brandNavy-950/40 p-2 rounded border border-brandNavy-750">
                                                <div class="flex justify-between font-bold text-slate-200">
                                                    <span>1. Kickoff / Mobilization (30%)</span>
                                                </div>
                                                <span class="text-[10px] font-mono text-brandBlue-300 block mt-0.5">
                                                    {formatCurrency(summary.minCost * 0.3)} - {formatCurrency(summary.maxCost * 0.3)}
                                                </span>
                                            </div>
                                            <div class="bg-brandNavy-950/40 p-2 rounded border border-brandNavy-750">
                                                <div class="flex justify-between font-bold text-slate-200">
                                                    <span>2. Mid-point SOP Mapping (40%)</span>
                                                </div>
                                                <span class="text-[10px] font-mono text-brandBlue-300 block mt-0.5">
                                                    {formatCurrency(summary.minCost * 0.4)} - {formatCurrency(summary.maxCost * 0.4)}
                                                </span>
                                            </div>
                                            <div class="bg-brandNavy-950/40 p-2 rounded border border-brandNavy-750">
                                                <div class="flex justify-between font-bold text-slate-200">
                                                    <span>3. Handover & Training (30%)</span>
                                                </div>
                                                <span class="text-[10px] font-mono text-brandBlue-300 block mt-0.5">
                                                    {formatCurrency(summary.minCost * 0.3)} - {formatCurrency(summary.maxCost * 0.3)}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Statement of Work Markdown Exporter */}
                                <div class="bg-brandNavy-900 border border-brandNavy-700 rounded-xl p-6 shadow-2xl space-y-4 backdrop-blur-sm">
                                    <div class="flex justify-between items-center">
                                        <h3 class="text-xs font-bold tracking-wider text-slate-300 uppercase font-mono">
                                            SOW Document Generator
                                        </h3>
                                        <button 
                                            onClick={copyToClipboard} 
                                            class="px-3 py-1.5 bg-brandNavy-950 hover:bg-brandNavy-800 rounded text-xs font-bold flex items-center transition-all text-brandBlue-400 border border-brandBlue-900/40"
                                        >
                                            {copied ? <IconCheckCircle /> : <IconCopy />}
                                            {copied ? 'Copy SOW' : 'Copy SOW'}
                                        </button>
                                    </div>
                                    <div class="bg-brandNavy-950 rounded p-4 border border-brandNavy-700/80 text-[11px] text-slate-400 font-mono overflow-y-auto max-h-48 whitespace-pre-line leading-relaxed">
                                        {proposalSummaryText}
                                    </div>
                                    <p class="text-[10px] text-slate-500 leading-relaxed text-center">
                                        Click Copy to grab the buffered SOW scope structure directly to your clipboard.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the React components inside the virtual DOM mount standard
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
